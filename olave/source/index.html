<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Source — vasugov/analytics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #161b22;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 1rem 0;
    }

    #sidebar h2 {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8b949e;
      padding: 0 1rem 0.75rem;
      border-bottom: 1px solid #30363d;
      margin-bottom: 0.5rem;
    }

    .tree-item {
      display: block;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      color: #c9d1d9;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .tree-item:hover {
      background: #21262d;
      color: #58a6ff;
    }

    .tree-item.active {
      background: #21262d;
      color: #58a6ff;
    }

    .tree-item.dir {
      color: #8b949e;
      font-weight: bold;
      cursor: default;
      padding-top: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .tree-item.dir:hover {
      background: none;
      color: #8b949e;
    }

    .tree-item.file {
      padding-left: 1.5rem;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #file-header {
      padding: 0.75rem 1.25rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 0.8rem;
      color: #8b949e;
      min-height: 40px;
    }

    #file-header span {
      color: #c9d1d9;
    }

    #code-container {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
    }

    #code-container pre {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    #placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #30363d;
      font-size: 1rem;
      letter-spacing: 0.1em;
    }

    #loading {
      color: #8b949e;
      padding: 1rem;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>vasugov / analytics</h2>
    <div id="tree"><div id="loading">Loading...</div></div>
  </div>

  <div id="main">
    <div id="file-header">Select a file to view its source</div>
    <div id="code-container">
      <div id="placeholder">← select a file</div>
    </div>
  </div>

  <script>
    const OWNER = 'vasugov';
    const REPO = 'analytics';
    const API = `https://api.github.com/repos/${OWNER}/${REPO}`;

    async function fetchTree() {
      const res = await fetch(`${API}/git/trees/HEAD?recursive=1`);
      const data = await res.json();
      return data.tree.filter(item => item.type === 'blob');
    }

    function buildTree(files) {
      const tree = {};
      for (const f of files) {
        const parts = f.path.split('/');
        const dir = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
        if (!tree[dir]) tree[dir] = [];
        tree[dir].push({ name: parts[parts.length - 1], path: f.path, sha: f.sha });
      }
      return tree;
    }

    function renderTree(tree) {
      const container = document.getElementById('tree');
      container.innerHTML = '';

      const dirs = Object.keys(tree).sort();
      for (const dir of dirs) {
        if (dir) {
          const label = document.createElement('button');
          label.className = 'tree-item dir';
          label.textContent = '/' + dir;
          container.appendChild(label);
        }

        for (const file of tree[dir]) {
          const btn = document.createElement('button');
          btn.className = 'tree-item file';
          btn.textContent = file.name;
          btn.title = file.path;
          btn.onclick = () => loadFile(file.path, btn);
          container.appendChild(btn);
        }
      }
    }

    async function loadFile(path, btn) {
      document.querySelectorAll('.tree-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const header = document.getElementById('file-header');
      const container = document.getElementById('code-container');
      header.innerHTML = `<span>${path}</span>`;
      container.innerHTML = '<div id="loading">Loading...</div>';

      const res = await fetch(`${API}/contents/${path}`);
      const data = await res.json();
      const content = atob(data.content.replace(/\n/g, ''));

      const ext = path.split('.').pop();
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.className = `language-${ext}`;
      code.textContent = content;
      pre.appendChild(code);

      container.innerHTML = '';
      container.appendChild(pre);
      hljs.highlightElement(code);
    }

    fetchTree().then(files => {
      const tree = buildTree(files);
      renderTree(tree);
    }).catch(() => {
      document.getElementById('tree').innerHTML = '<div style="padding:1rem;color:#f85149;font-size:0.8rem;">Failed to load repo.</div>';
    });
  </script>

</body>
</html>
