<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLAVE-NFL</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Times New Roman",Times,serif;font-size:15px;line-height:1.65;color:#000;background:#CBC3E3;max-width:680px;margin:0 auto;padding:2.5rem 1.25rem}
h1{font-size:1.35rem;font-weight:bold;margin-bottom:.2rem}
.sub{font-size:.85rem;color:#444;margin-bottom:1.6rem}
hr{border:none;border-top:1px solid #aaa;margin:1.5rem 0}
h2{font-size:1rem;font-weight:bold;margin-bottom:.85rem}
.field-row{display:flex;flex-wrap:wrap;gap:.5rem 1.75rem;margin-bottom:.9rem}
.field{display:flex;flex-direction:column;gap:2px}
.field label{font-size:.82rem}
select,input[type=number]{font-family:inherit;font-size:.82rem;border:1px solid #888;padding:2px 5px;background:#fff;color:#000}
button{font-family:inherit;font-size:.85rem;background:#fff;border:1px solid #000;padding:3px 18px;cursor:pointer;margin-top:.4rem}
button:hover{background:#f0f0f0}
.pred-out{display:none;margin-top:1.1rem;border-top:1px solid #ccc;padding-top:.9rem}
.metrics{display:flex;flex-wrap:wrap;gap:2rem}
.metric .lbl{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#555;display:block;margin-bottom:1px}
.metric .num{font-size:1.2rem;font-family:"Courier New",Courier,monospace}
.pos{color:#0a5c0a}
.neg{color:#8b0000}
@media(max-width:480px){.field-row{gap:.5rem 1rem}}
</style>
</head>
<body>

<h1>OLAVE-NFL</h1>
<p class="sub">by Vasudevan Govardhanen and Siddharth Kedharnath, epa, success rate, win probability, red zone, drive efficiency (2021&ndash;2023 regular season)</p>



<h2>Play Predictor</h2>
<div class="field-row">
  <div class="field"><label>Down (1&ndash;4)</label><select id="p-down"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
  <div class="field"><label>Yards to Go</label><input id="p-ydstogo" type="number" value="10" min="1" max="99"></div>
  <div class="field"><label>Yard Line (1 = opp gl)</label><input id="p-yardline" type="number" value="50" min="1" max="99"></div>
  <div class="field"><label>Score Differential</label><input id="p-score" type="number" value="0" min="-35" max="35"></div>
  <div class="field"><label>Seconds Remaining (half)</label><input id="p-time" type="number" value="900" min="0" max="1800"></div>
  <div class="field"><label>Play Type</label><select id="p-type"><option>pass</option><option>run</option></select></div>
</div>
<button onclick="runPredict()">Predict</button>

<div class="pred-out" id="pred-out">
  <div class="metrics">
    <div class="metric"><span class="lbl">Predicted EPA</span><span class="num" id="out-epa">&#8212;</span></div>
    <div class="metric"><span class="lbl">Success Probability</span><span class="num" id="out-success">&#8212;</span></div>
    <div class="metric"><span class="lbl">RZ TD Probability</span><span class="num" id="out-rz">&#8212;</span></div>
  </div>
</div>

<script>
let GRID = null;

async function loadGrid() {
  try {
    const r = await fetch('./data/prediction_grid.json');
    if (r.ok) GRID = await r.json();
  } catch(e) {}
}

const _EP = [[1,-1.64],[5,-0.97],[10,-0.29],[15,0.27],[20,0.70],[25,1.14],[30,1.48],[35,1.82],[40,2.10],[45,2.36],[50,2.60],[55,2.83],[60,3.01],[65,3.17],[70,3.40],[75,3.62],[80,3.88],[85,4.07],[90,4.35],[95,4.67],[99,4.94]];

function _lerp(tbl, x) {
  if (x <= tbl[0][0]) return tbl[0][1];
  if (x >= tbl[tbl.length-1][0]) return tbl[tbl.length-1][1];
  for (let i=0; i<tbl.length-1; i++) {
    if (x >= tbl[i][0] && x <= tbl[i+1][0]) {
      const t = (x-tbl[i][0]) / (tbl[i+1][0]-tbl[i][0]);
      return tbl[i][1] + t*(tbl[i+1][1]-tbl[i][1]);
    }
  }
  return 0;
}

function _approxEPA(down, ydstogo, yardline, scoreDiff) {
  const base = {1:0.035,2:-0.005,3:-0.068,4:-0.22}[down]||0;
  const dist  = -0.009 * Math.max(0, ydstogo - 7);
  const fp    = 0.0012 * Math.min(35, 100 - yardline);
  const score = -0.0008 * Math.abs(scoreDiff);
  return +(base + dist + fp + score).toFixed(4);
}

function _approxSuccess(down, ydstogo, yardline) {
  let p = 0.472 - (down-1)*0.032 - Math.max(0,ydstogo-7)*0.011;
  p += 0.0008 * Math.min(30, 100-yardline);
  return Math.max(0.18, Math.min(0.72, +p.toFixed(4)));
}

function _approxRZ(yardline) {
  if (yardline > 20) return null;
  return +(0.155 + (20-yardline)*0.009).toFixed(4);
}

function _gridLookup(down, ydstogo, yardline, scoreDiff) {
  if (!GRID || !GRID.length) return null;
  let best = null, bestDist = Infinity;
  for (const row of GRID) {
    const d = Math.abs(row.down-down) * 40
            + Math.abs(row.ydstogo-ydstogo) * 3
            + Math.abs(row.yardline_100-yardline)
            + Math.abs(row.score_differential-scoreDiff) * 2;
    if (d < bestDist) { bestDist=d; best=row; }
  }
  return best;
}

function runPredict() {
  const down     = parseInt(document.getElementById('p-down').value);
  const ydstogo  = parseInt(document.getElementById('p-ydstogo').value);
  const yardline = parseInt(document.getElementById('p-yardline').value);
  const score    = parseInt(document.getElementById('p-score').value);

  let epa, success, rz;
  const grid = _gridLookup(down, ydstogo, yardline, score);

  if (grid) {
    epa     = grid.pred_epa;
    success = grid.pred_success;
    rz      = null;
  } else {
    epa     = _approxEPA(down, ydstogo, yardline, score);
    success = _approxSuccess(down, ydstogo, yardline);
    rz      = _approxRZ(yardline);
  }

  const epaEl = document.getElementById('out-epa');
  epaEl.textContent = (epa >= 0 ? '+' : '') + epa.toFixed(4);
  epaEl.className   = 'num ' + (epa >= 0 ? 'pos' : 'neg');

  document.getElementById('out-success').textContent = (success * 100).toFixed(1) + '%';
  document.getElementById('out-rz').textContent = rz !== null ? (rz*100).toFixed(1)+'%' : yardline <= 20 ? '\u2014' : 'not in RZ';

  document.getElementById('pred-out').style.display = 'block';
}

loadGrid();
</script>
</body>
</html>
