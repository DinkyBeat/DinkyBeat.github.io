<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZINEZINEZINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ZINEZINEZINE — Literary Magazine */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

:root {
  --ink:    #0D0C0A;
  --paper:  #FDFCF7;
  --rule:   #0D0C0A;
  --muted:  #6B6860;
  --pale:   #E8E6DF;
  --cream:  #F5F3EC;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 19px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}

/* ─── MASTHEAD ─────────────────────────────────────────── */
.masthead {
  background: var(--paper);
  border-bottom: 3px double var(--ink);
  padding: 28px 32px 0;
}

.masthead-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 18px;
  border-bottom: 1px solid var(--pale);
}

.masthead-identity {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 24px 0 18px;
}

.zebra-logo {
  width: 72px;
  height: auto;
  flex-shrink: 0;
}

/* fallback if the external img fails to load */
.zebra-logo[data-failed="true"] {
  display: none;
}

.masthead-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.6rem, 6.5vw, 5.4rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 0.95;
  color: var(--ink);
  text-align: center;
}

/* ─── PAGE WRAP ─────────────────────────────────────────── */
.mag-wrap {
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ─── FEATURED ──────────────────────────────────────────── */
.featured {
  padding: 56px 0 48px;
  max-width: 720px;
  margin: 0 auto;
  text-align: center;
}

.featured-kicker {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.featured-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.2rem, 4.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
}

.featured-title a {
  color: var(--ink);
  text-decoration: none;
}

.featured-title a:hover {
  text-decoration: underline;
  text-decoration-thickness: 1px;
}

.featured-byline {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 22px;
}

@media (max-width: 680px) {
  .masthead-meta { flex-direction: column; gap: 4px; text-align: center; }
}

/* ─── FOOTER ─────────────────────────────────────────────── */
.mag-footer {
  border-top: 3px double var(--ink);
  background: var(--cream);
  padding: 28px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.mag-footer a { color: var(--ink); text-decoration: none; }
.mag-footer a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .mag-footer { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>

</header>
