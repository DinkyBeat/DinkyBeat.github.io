<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <span class="site-title" id="board-title">illnet</span>
    <div class="header-actions">
      <a class="btn-ghost" id="username-link" href="/illnet/forum/user.html" style="text-decoration:none"></a>
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <a class="back" href="/illnet/forum/">&larr; boards</a>

  <div class="form-section">
    <span class="section-label">new thread</span>
    <form id="new-thread-form">
      <input id="thread-title" type="text" placeholder="title" required>
      <textarea id="thread-body" placeholder="body" required></textarea>
      <button type="submit">post</button>
    </form>
  </div>

  <div id="thread-list"></div>

  <script src="../auth.js"></script>
  <script>
    const BOARD_NAMES = { b: 'random', econ: 'economics', math: 'math', cs: 'cs', meta: 'meta' };
    const board = new URLSearchParams(window.location.search).get('b') || 'b';
    document.getElementById('board-title').textContent = `/${board}/`;
    document.title = `illnet / /${board}/`;

    let currentUser = null;

    requireAuth(function(user) {
      currentUser = user;
      document.getElementById('username-link').textContent = getUsername(user);
      loadThreads();
    });

    async function loadThreads() {
      const { data: threads, error } = await client
        .from('threads')
        .select('id, title, username, created_at')
        .eq('board', board)
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }

      const list = document.getElementById('thread-list');
      list.innerHTML = '';

      if (!threads.length) {
        list.innerHTML = `<div style="padding:12px 14px;color:var(--dim);font-size:12px;">no threads.</div>`;
        return;
      }

      // Get reply counts in one query
      const ids = threads.map(t => t.id);
      const { data: replies } = await client.from('replies').select('thread_id').in('thread_id', ids);
      const replyCount = {};
      (replies || []).forEach(r => replyCount[r.thread_id] = (replyCount[r.thread_id] || 0) + 1);

      threads.forEach(t => {
        const row = document.createElement('div');
        row.className = 'thread-row';
        const n = replyCount[t.id] || 0;
        row.innerHTML = `
          <div>
            <a class="thread-title" href="/illnet/forum/thread.html?id=${t.id}">${escHtml(t.title)}</a>
            <div class="thread-byline">
              <a href="/illnet/forum/user.html?u=${encodeURIComponent(t.username || '')}" class="user-link">${escHtml(t.username || '?')}</a>
            </div>
          </div>
          <div class="thread-meta">
            <span class="thread-replies">${n} ${n === 1 ? 'reply' : 'replies'}</span>
            ${fmtDate(t.created_at)}
          </div>
        `;
        list.appendChild(row);
      });
    }

    document.getElementById('new-thread-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('thread-title').value.trim();
      const body = document.getElementById('thread-body').value.trim();
      const { error } = await client.from('threads').insert({
        title, body, board,
        user_id: currentUser.id,
        username: getUsername(currentUser)
      });
      if (error) { alert(error.message); return; }
      e.target.reset();
      loadThreads();
    });

    function escHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
  </script>

</body>
</html>
