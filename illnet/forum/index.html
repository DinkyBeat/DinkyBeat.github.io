<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet / board</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <span class="site-title">illnet / board</span>
    <div class="header-actions">
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <form id="new-thread-form">
    <input id="thread-title" type="text" placeholder="title" required>
    <textarea id="thread-body" placeholder="post body" required></textarea>
    <button type="submit">post</button>
  </form>

  <div id="thread-list"></div>

  <script src="../auth.js"></script>
  <script>
    requireAuth(function() {
      loadThreads();
    });

    async function loadThreads() {
      const { data, error } = await client
        .from('threads')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }

      const list = document.getElementById('thread-list');
      list.innerHTML = '';

      data.forEach(thread => {
        const div = document.createElement('div');
        div.innerHTML = `
          <h3><a href="/illnet/forum/thread.html?id=${thread.id}">${thread.title}</a></h3>
          <p>${thread.body}</p>
          <small>${new Date(thread.created_at).toLocaleString()}</small>
          <hr>
        `;
        list.appendChild(div);
      });
    }

    document.getElementById('new-thread-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('thread-title').value;
      const body = document.getElementById('thread-body').value;

      const { error } = await client.from('threads').insert({ title, body });
      if (error) { alert('Error posting: ' + error.message); return; }

      e.target.reset();
      loadThreads();
    });
  </script>

</body>
</html>
