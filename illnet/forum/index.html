<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet / boards</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <span class="site-title">illnet / boards</span>
    <div class="header-actions">
      <a class="btn-ghost" id="username-link" href="/illnet/forum/user.html" style="text-decoration:none"></a>
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <div class="board-list">
    <a class="board-row" href="/illnet/forum/board.html?b=b">
      <span class="board-code">/b/</span>
      <span class="board-name">random</span>
      <span class="board-desc">— anything goes</span>
      <span class="board-arrow">→</span>
    </a>
    <a class="board-row" href="/illnet/forum/board.html?b=econ">
      <span class="board-code">/econ/</span>
      <span class="board-name">economics</span>
      <span class="board-desc">— markets, macro, theory</span>
      <span class="board-arrow">→</span>
    </a>
    <a class="board-row" href="/illnet/forum/board.html?b=math">
      <span class="board-code">/math/</span>
      <span class="board-name">math</span>
      <span class="board-desc">— problem solving, proofs, discussion</span>
      <span class="board-arrow">→</span>
    </a>
    <a class="board-row" href="/illnet/forum/board.html?b=cs">
      <span class="board-code">/cs/</span>
      <span class="board-name">cs & programming</span>
      <span class="board-desc">— systems, algorithms, software</span>
      <span class="board-arrow">→</span>
    </a>
    <a class="board-row" href="/illnet/forum/board.html?b=meta">
      <span class="board-code">/meta/</span>
      <span class="board-name">meta</span>
      <span class="board-desc">— about illnet</span>
      <span class="board-arrow">→</span>
    </a>
  </div>

  <script src="../auth.js"></script>
  <script>
    requireAuth(function(user) {
      document.getElementById('username-link').textContent = user.email.replace('@illnet.com', '');
    });
  </script>

</body>
</html>
