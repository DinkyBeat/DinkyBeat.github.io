<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet / thread</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <span class="site-title" id="board-crumb">illnet</span>
    <div class="header-actions">
      <a class="btn-ghost" id="username-link" href="/illnet/forum/user.html" style="text-decoration:none"></a>
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <a class="back" id="back-link" href="/illnet/forum/">&larr; board</a>

  <div id="op-post"></div>

  <h3 class="reply-label">reply</h3>
  <div id="reply-form-wrap">
    <div class="reply-context" id="reply-context">
      <span id="reply-context-text"></span>
      <button class="btn-ghost" id="cancel-reply">× cancel</button>
    </div>
    <form id="reply-form">
      <textarea id="reply-body" placeholder="write a reply" required></textarea>
      <button type="submit">post</button>
    </form>
  </div>

  <h3 class="reply-label" id="replies-label" style="display:none">replies</h3>
  <div id="reply-list"></div>

  <script src="../auth.js"></script>
  <script>
    const threadId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let replyTarget = null;

    requireAuth(function(user) {
      currentUser = user;
      document.getElementById('username-link').textContent = getUsername(user);
      loadThread();
      loadReplies();
    });

    // ── OP ───────────────────────────────────────────────────────
    async function loadThread() {
      const { data, error } = await client.from('threads').select('*').eq('id', threadId).single();
      if (error) { console.error(error); return; }

      const board = data.board || 'b';
      document.title = `illnet / ${data.title}`;
      document.getElementById('board-crumb').textContent = `/${board}/`;
      document.getElementById('back-link').href = `/illnet/forum/board.html?b=${board}`;
      document.getElementById('back-link').textContent = `← /${board}/`;

      document.getElementById('op-post').innerHTML = `
        <div class="op-post">
          <div class="op-header">
            <a href="/illnet/forum/user.html?u=${encodeURIComponent(data.username || '')}" class="user-link op-author">${escHtml(data.username || '?')}</a>
            <span class="op-time">${fmtTime(data.created_at)}</span>
          </div>
          <div class="op-title">${escHtml(data.title)}</div>
          <div class="op-body">${parseMentions(data.body)}</div>
        </div>
      `;
    }

    // ── replies ───────────────────────────────────────────────────
    async function loadReplies() {
      const { data, error } = await client
        .from('replies').select('*').eq('thread_id', threadId).order('created_at', { ascending: true });
      if (error) { console.error(error); return; }

      const label = document.getElementById('replies-label');
      const list = document.getElementById('reply-list');
      list.innerHTML = '';

      if (!data.length) { label.style.display = 'none'; return; }
      label.style.display = 'block';

      buildTree(data).forEach(node => list.appendChild(renderReply(node)));
      list.onclick = handleClick;
    }

    function buildTree(rows) {
      const map = {};
      const roots = [];
      rows.forEach(r => map[r.id] = { ...r, children: [] });
      rows.forEach(r => {
        if (r.parent_id && map[r.parent_id]) map[r.parent_id].children.push(map[r.id]);
        else roots.push(map[r.id]);
      });
      return roots;
    }

    function renderReply(reply) {
      const hasChildren = reply.children.length > 0;
      const node = document.createElement('div');
      node.className = 'reply-node';
      node.dataset.id = reply.id;

      node.innerHTML = `
        <div class="reply-content">
          <div class="reply-header">
            <a href="/illnet/forum/user.html?u=${encodeURIComponent(reply.username || '')}" class="user-link reply-author">${escHtml(reply.username || '?')}</a>
            <span class="reply-time">${fmtTime(reply.created_at)}</span>
            <div class="reply-actions">
              <button class="btn-ghost reply-btn" data-id="${reply.id}" data-user="${escHtml(reply.username || '?')}">reply</button>
              ${hasChildren ? `<button class="btn-ghost collapse-btn" data-id="${reply.id}">▾</button>` : ''}
            </div>
          </div>
          <div class="reply-body">${parseMentions(reply.body)}</div>
        </div>
        ${hasChildren ? `<div class="reply-children"></div>` : ''}
      `;

      if (hasChildren) {
        const el = node.querySelector('.reply-children');
        reply.children.forEach(c => el.appendChild(renderReply(c)));
      }
      return node;
    }

    function handleClick(e) {
      const rb = e.target.closest('.reply-btn');
      if (rb) { setReplyTarget(rb.dataset.id, rb.dataset.user); return; }

      const cb = e.target.closest('.collapse-btn');
      if (cb) {
        const children = cb.closest('.reply-node').querySelector('.reply-children');
        const collapsed = children.style.display === 'none';
        children.style.display = collapsed ? '' : 'none';
        cb.textContent = collapsed ? '▾' : '▸';
      }
    }

    function setReplyTarget(id, username) {
      replyTarget = { id, username };
      document.getElementById('reply-context-text').innerHTML =
        `replying to <span class="mention">@${escHtml(username)}</span>`;
      document.getElementById('reply-context').classList.add('active');
      document.getElementById('reply-body').focus();
      document.getElementById('reply-form-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    document.getElementById('cancel-reply').onclick = () => {
      replyTarget = null;
      document.getElementById('reply-context').classList.remove('active');
    };

    document.getElementById('reply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = document.getElementById('reply-body').value.trim();
      if (!body) return;

      const { error } = await client.from('replies').insert({
        thread_id: threadId, body,
        user_id: currentUser.id,
        username: getUsername(currentUser),
        parent_id: replyTarget ? replyTarget.id : null
      });

      if (error) { alert(error.message); return; }
      e.target.reset();
      replyTarget = null;
      document.getElementById('reply-context').classList.remove('active');
      loadReplies();
    });

    // ── helpers ───────────────────────────────────────────────────
    function escHtml(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function parseMentions(text) {
      return escHtml(text).replace(/@(\w+)/g, '<span class="mention">@$1</span>');
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
  </script>

</body>
</html>
