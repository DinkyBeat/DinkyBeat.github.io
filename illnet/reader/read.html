<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illreader</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="../style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body { width: min(95vw, 1500px); padding: 24px 16px 80px; }

    /* ── reader toolbar ── */
    .reader-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .reader-sep { color: var(--dim); font-size: 11px; }
    .reader-page-info { font-size: 12px; color: var(--text); font-family: 'Courier New', monospace; }
    .page-jump {
      width: 44px; padding: 2px 6px; font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; text-align: center;
    }
    .page-jump:focus { border-color: var(--red); outline: none; }
    .scale-display { font-size: 11px; color: var(--dim); min-width: 36px; text-align: center; }

    /* highlight toggle active state */
    .btn-ghost.active { color: var(--red); }

    /* color swatches */
    .color-swatches { display: flex; gap: 5px; align-items: center; }
    .swatch {
      width: 14px; height: 14px; border: 1px solid var(--border);
      cursor: pointer; padding: 0; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.selected { border-color: var(--text); transform: scale(1.15); }

    /* bookmark indicator */
    .bm-indicator { color: var(--red); font-size: 14px; line-height: 1; }

    /* flash message */
    .flash-msg {
      font-size: 11px; color: var(--muted); letter-spacing: 0.08em;
      opacity: 0; transition: opacity 0.2s;
    }
    .flash-msg.show { opacity: 1; }

    /* ── scroll area ── */
    .reader-scroll { overflow-x: auto; text-align: center; padding: 8px 0 24px; }

    /* ── canvas wrap ── */
    #canvas-wrap {
      position: relative;
      display: inline-block;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      user-select: none;
    }

    #pdf-canvas { display: block; }

    /* highlight layer — shows saved highlights */
    #highlight-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .hl-rect {
      position: absolute;
      pointer-events: all;
      cursor: default;
    }
    .hl-rect .hl-del {
      display: none;
      position: absolute; top: -9px; right: -9px;
      width: 16px; height: 16px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--dim); font-size: 10px; cursor: pointer; padding: 0;
      font-family: inherit; line-height: 14px; text-align: center;
    }
    .hl-rect:hover .hl-del { display: block; }
    .hl-rect .hl-del:hover { color: var(--red); border-color: var(--red); }

    /* draw layer — captures mouse for new highlights */
    #draw-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #canvas-wrap.draw-active #draw-layer {
      pointer-events: all;
      cursor: crosshair;
    }
    #draw-preview {
      position: absolute;
      border: 1px dashed rgba(255,255,255,0.5);
      pointer-events: none;
      display: none;
    }

    /* ── panel ── */
    .reader-panel {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .reader-panel-tabs {
      display: flex; gap: 0; margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--dim); font-family: inherit; font-size: 11px;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; padding: 6px 16px 8px; margin-bottom: -1px;
      transition: color 0.1s, border-color 0.1s;
    }
    .panel-tab-btn:hover { color: var(--text); }
    .panel-tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

    .panel-empty { color: var(--dim); font-size: 12px; padding: 10px 14px; border-left: 2px solid var(--border); }

    /* panel rows */
    .panel-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 9px 14px; border-left: 2px solid var(--border);
      font-size: 12px; cursor: pointer; transition: border-color 0.1s;
    }
    .panel-row + .panel-row { border-top: 1px solid var(--sep); }
    .panel-row:hover { border-left-color: var(--red); color: var(--text-bright); }
    .panel-row-page { color: var(--red); font-size: 11px; min-width: 40px; }
    .panel-row-text { color: var(--text); flex: 1; padding: 0 12px; }
    .panel-row-del { background: none; border: none; color: var(--dim); font-family: inherit; font-size: 11px; cursor: pointer; padding: 0; }
    .panel-row-del:hover { color: var(--red); }

    /* highlight swatch in panel */
    .panel-hl-swatch { width: 10px; height: 10px; display: inline-block; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <header class="site-header">
    <span class="site-title">
      <a href="/illnet/reader/" style="color:var(--red);text-decoration:none">illreader</a>
      <span style="color:var(--dim)"> / </span>
      <span id="pdf-title" style="color:var(--text);font-size:12px;letter-spacing:0.1em"></span>
    </span>
    <div class="header-actions">
      <a class="btn-ghost" id="username-link" href="/illnet/forum/user.html" style="text-decoration:none"></a>
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="reader-toolbar">
    <button class="btn-ghost" id="btn-prev" onclick="goPage(currentPage - 1)">← prev</button>
    <input class="page-jump" type="number" id="page-jump" min="1" value="1">
    <span class="reader-page-info">/ <span id="total-pages">—</span></span>
    <button class="btn-ghost" id="btn-next" onclick="goPage(currentPage + 1)">next →</button>

    <span class="reader-sep">|</span>

    <button class="btn-ghost" onclick="zoom(-0.25)">−</button>
    <span class="scale-display" id="scale-display">150%</span>
    <button class="btn-ghost" onclick="zoom(+0.25)">+</button>

    <span class="reader-sep">|</span>

    <button class="btn-ghost" id="btn-mark" onclick="toggleDrawMode()">mark</button>
    <div class="color-swatches" id="color-swatches">
      <button class="swatch selected" data-color="rgba(255,215,0,0.38)" style="background:#ffd700" onclick="pickColor(this)"></button>
      <button class="swatch" data-color="rgba(90,200,90,0.38)"  style="background:#5ac85a" onclick="pickColor(this)"></button>
      <button class="swatch" data-color="rgba(80,140,255,0.38)" style="background:#508cff" onclick="pickColor(this)"></button>
      <button class="swatch" data-color="rgba(204,34,0,0.38)"   style="background:#cc2200" onclick="pickColor(this)"></button>
    </div>

    <span class="reader-sep">|</span>

    <button class="btn-ghost" id="btn-bookmark" onclick="toggleBookmark()">
      <span id="bm-star"></span> bookmark
    </button>

    <button class="btn-ghost" id="btn-panel" onclick="togglePanel()">panel</button>

    <span class="flash-msg" id="flash"></span>
  </div>

  <!-- Canvas scroll area -->
  <div class="reader-scroll">
    <div id="canvas-wrap">
      <canvas id="pdf-canvas"></canvas>
      <div id="highlight-layer"></div>
      <div id="draw-layer">
        <div id="draw-preview"></div>
      </div>
    </div>
  </div>

  <!-- Panel -->
  <div class="reader-panel" id="reader-panel" style="display:none">
    <div class="reader-panel-tabs">
      <button class="panel-tab-btn active" id="tab-bm" onclick="switchTab('bm')">bookmarks</button>
      <button class="panel-tab-btn" id="tab-hl" onclick="switchTab('hl')">highlights</button>
    </div>
    <div id="panel-bm"></div>
    <div id="panel-hl" style="display:none"></div>
  </div>

  <script src="../auth.js"></script>
  <script>
    // ── state ──────────────────────────────────────────────
    let pdfDoc      = null;
    let currentPage = 1;
    let totalPages  = 0;
    let scale       = 1.5;
    let renderTask  = null;
    let currentUser = null;
    let pdfId       = null;
    let highlights  = [];
    let bookmarks   = [];
    let drawMode    = false;
    let drawing     = false;
    let drawStart   = null;
    let drawColor   = 'rgba(255,215,0,0.38)';
    let panelOpen   = false;
    let activeTab   = 'bm';

    // ── init ───────────────────────────────────────────────
    requireAuth(async function(user) {
      currentUser = user;
      document.getElementById('username-link').textContent = getUsername(user);

      const params = new URLSearchParams(location.search);
      pdfId = parseInt(params.get('id'));
      if (!pdfId) { location.href = '/illnet/reader/'; return; }

      const { data: pdfData } = await client.from('pdfs').select('*').eq('id', pdfId).single();
      if (!pdfData) { location.href = '/illnet/reader/'; return; }

      document.getElementById('pdf-title').textContent = pdfData.title;
      document.title = 'illreader / ' + pdfData.title;

      await Promise.all([loadHighlights(), loadBookmarks()]);

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      const pdfUrl = SUPABASE_URL + '/storage/v1/object/public/pdfs/' + encodeURIComponent(pdfData.filename);

      try {
        pdfDoc = await pdfjsLib.getDocument({
          url: pdfUrl,
          cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
          cMapPacked: true
        }).promise;
      } catch (e) {
        flash('error loading pdf: ' + e.message);
        return;
      }

      totalPages = pdfDoc.numPages;
      document.getElementById('total-pages').textContent = totalPages;
      document.getElementById('page-jump').max = totalPages;

      const saved = parseInt(localStorage.getItem('illnet-reader-' + pdfId)) || 1;
      goPage(Math.min(Math.max(1, saved), totalPages), true);
    });

    // ── page navigation ────────────────────────────────────
    function goPage(n, skipSave) {
      if (!pdfDoc) return;
      n = Math.max(1, Math.min(n, totalPages));
      currentPage = n;
      if (!skipSave) localStorage.setItem('illnet-reader-' + pdfId, n);
      document.getElementById('page-jump').value = n;
      document.getElementById('btn-prev').disabled = n <= 1;
      document.getElementById('btn-next').disabled = n >= totalPages;
      updateBookmarkBtn();
      renderPage(n);
    }

    document.getElementById('page-jump').addEventListener('change', function() {
      goPage(parseInt(this.value) || 1);
    });
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPage(currentPage - 1);
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goPage(currentPage + 1);
    });

    // ── render ─────────────────────────────────────────────
    async function renderPage(num) {
      if (!pdfDoc) return;
      if (renderTask) { try { renderTask.cancel(); } catch(e) {} }

      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale });
      const canvas = document.getElementById('pdf-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      const wrap = document.getElementById('canvas-wrap');
      wrap.style.width  = viewport.width  + 'px';
      wrap.style.height = viewport.height + 'px';

      renderTask = page.render({ canvasContext: ctx, viewport });
      try { await renderTask.promise; } catch(e) { if (e.name !== 'RenderingCancelledException') throw e; }
      renderTask = null;

      renderHighlights();
    }

    // ── zoom ───────────────────────────────────────────────
    function zoom(delta) {
      scale = Math.max(0.5, Math.min(4, scale + delta));
      document.getElementById('scale-display').textContent = Math.round(scale * 100) + '%';
      renderPage(currentPage);
    }

    // ── draw mode (highlights) ─────────────────────────────
    function toggleDrawMode() {
      drawMode = !drawMode;
      document.getElementById('canvas-wrap').classList.toggle('draw-active', drawMode);
      document.getElementById('btn-mark').classList.toggle('active', drawMode);
    }

    function pickColor(btn) {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      drawColor = btn.dataset.color;
    }

    const drawLayer = document.getElementById('draw-layer');
    const drawPreview = document.getElementById('draw-preview');

    drawLayer.addEventListener('mousedown', function(e) {
      if (!drawMode) return;
      drawing = true;
      const r = drawLayer.getBoundingClientRect();
      drawStart = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
      drawPreview.style.cssText = `position:absolute;background:${drawColor};border:1px dashed rgba(255,255,255,0.4);pointer-events:none;display:block;`;
    });

    drawLayer.addEventListener('mousemove', function(e) {
      if (!drawing) return;
      const r  = drawLayer.getBoundingClientRect();
      const cx = (e.clientX - r.left) / r.width;
      const cy = (e.clientY - r.top) / r.height;
      const x1 = Math.min(drawStart.x, cx), y1 = Math.min(drawStart.y, cy);
      const x2 = Math.max(drawStart.x, cx), y2 = Math.max(drawStart.y, cy);
      drawPreview.style.left   = (x1 * 100) + '%';
      drawPreview.style.top    = (y1 * 100) + '%';
      drawPreview.style.width  = ((x2 - x1) * 100) + '%';
      drawPreview.style.height = ((y2 - y1) * 100) + '%';
    });

    drawLayer.addEventListener('mouseup', async function(e) {
      if (!drawing) return;
      drawing = false;
      drawPreview.style.display = 'none';

      const r  = drawLayer.getBoundingClientRect();
      const cx = (e.clientX - r.left) / r.width;
      const cy = (e.clientY - r.top) / r.height;
      const x1 = Math.min(drawStart.x, cx), y1 = Math.min(drawStart.y, cy);
      const x2 = Math.max(drawStart.x, cx), y2 = Math.max(drawStart.y, cy);

      if ((x2 - x1) < 0.01 || (y2 - y1) < 0.005) return;
      await saveHighlight(x1, y1, x2 - x1, y2 - y1);
    });

    // cancel draw on mouseup outside
    document.addEventListener('mouseup', function() { drawing = false; drawPreview.style.display = 'none'; });

    // ── highlights ─────────────────────────────────────────
    async function loadHighlights() {
      const { data } = await client.from('reader_highlights')
        .select('*')
        .eq('pdf_id', pdfId)
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: true });
      highlights = data || [];
    }

    async function saveHighlight(x, y, w, h) {
      const { data, error } = await client.from('reader_highlights').insert({
        user_id: currentUser.id,
        username: getUsername(currentUser),
        pdf_id: pdfId,
        page_num: currentPage,
        x, y, w, h,
        color: drawColor
      }).select().single();
      if (!error && data) {
        highlights.push(data);
        renderHighlights();
        updatePanel();
        flash('highlight saved');
      }
    }

    async function deleteHighlight(id) {
      await client.from('reader_highlights').delete().eq('id', id);
      highlights = highlights.filter(h => h.id !== id);
      renderHighlights();
      updatePanel();
    }

    function renderHighlights() {
      const layer = document.getElementById('highlight-layer');
      const pageHls = highlights.filter(h => h.page_num === currentPage);
      layer.innerHTML = pageHls.map(h => `
        <div class="hl-rect" style="
          left:${h.x*100}%; top:${h.y*100}%;
          width:${h.w*100}%; height:${h.h*100}%;
          background:${h.color};
        ">
          <button class="hl-del" onclick="deleteHighlight(${h.id})" title="remove">×</button>
        </div>
      `).join('');
    }

    // ── bookmarks ──────────────────────────────────────────
    async function loadBookmarks() {
      const { data } = await client.from('reader_bookmarks')
        .select('*')
        .eq('pdf_id', pdfId)
        .eq('user_id', currentUser.id)
        .order('page_num', { ascending: true });
      bookmarks = data || [];
    }

    async function toggleBookmark() {
      const existing = bookmarks.find(b => b.page_num === currentPage);
      if (existing) {
        await client.from('reader_bookmarks').delete().eq('id', existing.id);
        bookmarks = bookmarks.filter(b => b.id !== existing.id);
        flash('bookmark removed');
      } else {
        const { data, error } = await client.from('reader_bookmarks').insert({
          user_id: currentUser.id,
          username: getUsername(currentUser),
          pdf_id: pdfId,
          page_num: currentPage
        }).select().single();
        if (!error && data) {
          bookmarks.push(data);
          flash('page ' + currentPage + ' bookmarked');
        }
      }
      updateBookmarkBtn();
      updatePanel();
    }

    async function deleteBookmark(id) {
      await client.from('reader_bookmarks').delete().eq('id', id);
      bookmarks = bookmarks.filter(b => b.id !== id);
      updateBookmarkBtn();
      updatePanel();
    }

    function updateBookmarkBtn() {
      const isBookmarked = bookmarks.some(b => b.page_num === currentPage);
      document.getElementById('bm-star').textContent = isBookmarked ? '★' : '☆';
    }

    // ── panel ──────────────────────────────────────────────
    function togglePanel() {
      panelOpen = !panelOpen;
      const panel = document.getElementById('reader-panel');
      panel.style.display = panelOpen ? 'block' : 'none';
      document.getElementById('btn-panel').classList.toggle('active', panelOpen);
      if (panelOpen) updatePanel();
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('panel-bm').style.display  = tab === 'bm' ? 'block' : 'none';
      document.getElementById('panel-hl').style.display  = tab === 'hl' ? 'block' : 'none';
      document.getElementById('tab-bm').classList.toggle('active', tab === 'bm');
      document.getElementById('tab-hl').classList.toggle('active', tab === 'hl');
    }

    function updatePanel() {
      if (!panelOpen) return;

      // Bookmarks tab
      const bmEl = document.getElementById('panel-bm');
      if (!bookmarks.length) {
        bmEl.innerHTML = `<div class="panel-empty">no bookmarks yet.</div>`;
      } else {
        bmEl.innerHTML = bookmarks.map(b => `
          <div class="panel-row" onclick="goPage(${b.page_num})">
            <span class="panel-row-page">p.${b.page_num}</span>
            <span class="panel-row-text" style="color:var(--dim)">${b.page_num === currentPage ? '← current' : ''}</span>
            <button class="panel-row-del" onclick="event.stopPropagation();deleteBookmark(${b.id})">remove</button>
          </div>
        `).join('');
      }

      // Highlights tab
      const hlEl = document.getElementById('panel-hl');
      if (!highlights.length) {
        hlEl.innerHTML = `<div class="panel-empty">no highlights yet.</div>`;
      } else {
        // Group by page
        const byPage = {};
        highlights.forEach(h => (byPage[h.page_num] = byPage[h.page_num] || []).push(h));
        hlEl.innerHTML = Object.keys(byPage).sort((a,b) => a-b).map(p => `
          <div class="panel-row" onclick="goPage(${p})">
            <span class="panel-row-page">p.${p}</span>
            <span class="panel-row-text">
              ${byPage[p].map(h =>
                `<span class="panel-hl-swatch" style="background:${h.color.replace('0.38','0.8')}"></span>`
              ).join(' ')}
              <span style="color:var(--dim);font-size:11px;margin-left:6px">${byPage[p].length} mark${byPage[p].length > 1 ? 's' : ''}</span>
            </span>
            <button class="panel-row-del" onclick="event.stopPropagation();deletePageHighlights(${p})">clear</button>
          </div>
        `).join('');
      }
    }

    async function deletePageHighlights(pageNum) {
      const ids = highlights.filter(h => h.page_num === pageNum).map(h => h.id);
      for (const id of ids) await client.from('reader_highlights').delete().eq('id', id);
      highlights = highlights.filter(h => h.page_num !== pageNum);
      renderHighlights();
      updatePanel();
    }

    // ── flash message ──────────────────────────────────────
    let flashTimer = null;
    function flash(msg) {
      const el = document.getElementById('flash');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }
  </script>

</body>
</html>
