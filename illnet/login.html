<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet / login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div style="display:flex;justify-content:flex-end;margin-bottom:0">
    <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()" style="margin-bottom:0">light</button>
  </div>

  <div class="login-wrap">
    <h1>illnet</h1>
    <form id="login-form">
      <input id="email" type="email" placeholder="email" required autocomplete="email">
      <input id="password" type="password" placeholder="password" required autocomplete="current-password">
      <button type="submit">sign in</button>
    </form>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script src="./auth.js"></script>
  <script>
    // If already logged in, go straight to board
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/illnet/';
    });

    syncThemeBtn();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');

      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        return;
      }
      window.location.href = '/illnet/';
    });
  </script>

</body>
</html>
