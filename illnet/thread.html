<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>illnet / thread</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./style.css">
  <script>
    (function() {
      const t = localStorage.getItem('illnet-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header class="site-header">
    <span class="site-title">illnet / thread</span>
    <div class="header-actions">
      <button class="btn-ghost" id="theme-btn" onclick="toggleTheme()">light</button>
      <button class="btn-ghost" onclick="logout()">logout</button>
    </div>
  </header>

  <a class="back" href="/illnet/">&larr; board</a>

  <div id="thread-content"></div>
  <hr>

  <h3 class="reply-label">replies</h3>
  <form id="reply-form">
    <textarea id="reply-body" placeholder="your reply" required></textarea>
    <button type="submit">reply</button>
  </form>
  <div id="reply-list"></div>

  <script src="./auth.js"></script>
  <script>
    const threadId = new URLSearchParams(window.location.search).get('id');

    requireAuth(function() {
      loadThread();
      loadReplies();
    });

    async function loadThread() {
      const { data, error } = await client
        .from('threads')
        .select('*')
        .eq('id', threadId)
        .single();

      if (error) { console.error(error); return; }

      document.getElementById('thread-content').innerHTML = `
        <h2>${data.title}</h2>
        <p>${data.body}</p>
      `;
    }

    async function loadReplies() {
      const { data, error } = await client
        .from('replies')
        .select('*')
        .eq('thread_id', threadId)
        .order('created_at', { ascending: true });

      if (error) { console.error(error); return; }

      const list = document.getElementById('reply-list');
      list.innerHTML = '';

      data.forEach(reply => {
        const div = document.createElement('div');
        div.innerHTML = `<p>${reply.body}</p><small>${new Date(reply.created_at).toLocaleString()}</small><hr>`;
        list.appendChild(div);
      });
    }

    document.getElementById('reply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = document.getElementById('reply-body').value;

      const { error } = await client.from('replies').insert({ thread_id: threadId, body });
      if (error) { alert('Error: ' + error.message); return; }

      e.target.reset();
      loadReplies();
    });
  </script>

</body>
</html>
