<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>
.project-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
}
.project-row:first-child { border-top: 1px solid var(--border); }
.project-row:hover .project-name { text-decoration-color: var(--text); }

.project-left { display: flex; flex-direction: column; gap: 3px; }
.project-name {
  font-size: 15px; font-weight: 500;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--border);
}
.project-sub { font-size: 13px; color: var(--muted); }
.project-year { font-size: 13px; color: var(--muted); flex-shrink: 0; margin-left: 20px; }
</style>
</head>
<body>

<div id="scrollBar"></div>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Vasudevan Govardhanen</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/problems/">Problems</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/notes/">Notes</a></li>
      <li><a href="/about/">About</a></li>
    </ul>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-title">
    <h1>Projects</h1>
  </div>

  <div id="project-list" style="padding-bottom: 96px;"></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026</span>
    <a href="/contact/">Contact</a>
  </div>
</footer>

<script src="/js/site.js"></script>
<script>
/* ====================================================
   PROJECTS DATA
   To add a project: add one object to this array.
   Fields:
     name    — project name
     sub     — one-line description
     year    — year string
     url     — link (use "/projects/slug/" for hosted pages)
   ==================================================== */

const PROJECTS = [
  {
    name: "OLAVE-NFL",
    sub:  "The Operational Longitudinal Analytics Validation Engine for the National Football League",
    year: "2024",
    url:  "/projects/olave/",
  },

  /* ── Add new projects below this line ──
  {
    name: "JAYHOC",
    sub:  "College basketball analytics",
    year: "2025",
    url:  "/projects/jayhoc/",
  },
  ── */
];

/* Renderer — no need to edit below */
const list = document.getElementById('project-list');
PROJECTS.forEach(p => {
  const a = document.createElement('a');
  a.className = 'project-row';
  a.href = p.url;
  a.innerHTML = `
    <div class="project-left">
      <span class="project-name">${p.name}</span>
      <span class="project-sub">${p.sub}</span>
    </div>
    <span class="project-year">${p.year}</span>`;
  list.appendChild(a);
});
</script>
</body>
</html>
