<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Vasudevan Govardhanen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>
/* ── Project cards (generated by JS below) ─────── */
.project-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 28px;
  transition: box-shadow 0.2s;
}
.project-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

.card-top {
  padding: 22px 26px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 14px;
}
.card-top-left h2 {
  font-family: var(--ff-head);
  font-size: 24px; font-weight: 700; margin-bottom: 3px;
}
.card-top-left .card-sub { font-size: 13px; color: var(--muted); }
.card-top-right {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 8px; flex-shrink: 0;
}

.card-body {
  display: grid;
  grid-template-columns: 1fr auto;
}
.card-desc-area {
  padding: 22px 26px;
  border-right: 1px solid var(--border);
}
.card-desc-area p {
  font-size: 14.5px; color: var(--muted);
  line-height: 1.75; margin-bottom: 16px;
}
.card-desc-area a {
  color: var(--accent); text-decoration: none; font-weight: 500;
}
.card-desc-area a:hover { text-decoration: underline; }

.card-actions {
  padding: 22px 24px;
  display: flex; flex-direction: column; gap: 8px;
  min-width: 210px;
}
.card-actions .actions-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 2px;
}
.action-btn {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 11px 13px;
  border-radius: 4px;
  border: 1px solid var(--border);
  text-decoration: none; color: var(--text);
  transition: all 0.18s;
}
.action-btn:hover { background: var(--surface); border-color: #bbb; }
.action-btn.primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.action-btn.primary:hover { background: #e55a14; border-color: #e55a14; }
.action-btn-info { display: flex; flex-direction: column; gap: 2px; }
.action-btn-name { font-size: 13px; font-weight: 500; }
.action-btn-sub  { font-size: 11px; opacity: 0.7; }
.action-btn-arrow { font-size: 13px; }

@media (max-width: 700px) {
  .card-body  { grid-template-columns: 1fr; }
  .card-desc-area { border-right: none; border-bottom: 1px solid var(--border); }
  .card-actions { min-width: unset; }
  .card-top { flex-direction: column; }
}
</style>
</head>
<body>

<div id="scrollBar"></div>

<!-- ── Navigation ──────────────────────────────── -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Vasudevan Govardhanen</a>
    <ul class="nav-links">
      <li><a href="/about/">About</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/notes/">Notes</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/contact/">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="page-wrap">

  <header class="page-header">
    <p class="eyebrow">Engineering &amp; Research</p>
    <h1>Projects</h1>
    <p class="subtitle">Active research, software, and analytics work.</p>
  </header>

  <!-- Projects are rendered here by the script below -->
  <div id="project-list"></div>

</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© 2026 Vasudevan Govardhanen</span>
    <div class="footer-links"><a href="/">Home</a></div>
  </div>
</footer>

<script src="/js/site.js"></script>
<script>
/* ====================================================
   PROJECTS DATA
   ====================================================
   To add a new project: copy one object from the array
   and fill in the fields. All fields except `links`
   are plain strings. `stack` is an array of strings.
   `links` is an array of button objects (see below).

   Link object fields:
     label    — button text
     sub      — small subtitle line (optional, use "")
     url      — where it goes
     primary  — true = orange filled, false = outlined
   ==================================================== */

const PROJECTS = [

  {
    title:    "Olave — NFL Analytics",
    subtitle: "Advanced metrics framework · Python · R · Jupyter",
    status:   "In Progress",
    github:   "https://github.com/vasugov/analytics",
    description: `A research-oriented framework for computing advanced NFL metrics
      from play-by-play data. Processes historical datasets using nflfastR, with
      future plans for real-time streaming during live games.
      Hosted live at <a href="https://olave.govardha.net" target="_blank" rel="noopener">olave.govardha.net ↗</a>.`,
    stack: ["Python", "R / nflfastR", "Pandas", "Plotly", "Jupyter", "PostgreSQL", "Kafka (planned)"],
    links: [
      {
        label:   "Live site",
        sub:     "olave.govardha.net",
        url:     "https://olave.govardha.net",
        primary: true,
      },
      {
        label:   "Run in Binder",
        sub:     "Interactive, no install",
        url:     "https://mybinder.org/v2/gh/vasugov/analytics/HEAD?labpath=notebooks%2Flooks%2Fmetrics1.ipynb",
        primary: false,
      },
      {
        label:   "Open in Colab",
        sub:     "Google Colab",
        url:     "https://colab.research.google.com/github/vasugov/analytics/blob/main/notebooks/looks/metrics1.ipynb",
        primary: false,
      },
      {
        label:   "View Notebook",
        sub:     "Read-only · nbviewer",
        url:     "https://nbviewer.org/github/vasugov/analytics/blob/main/notebooks/looks/metrics1.ipynb",
        primary: false,
      },
    ],
  },

  /* ── PASTE NEW PROJECTS BELOW THIS LINE ──────────
  {
    title:    "My New Project",
    subtitle: "One-liner about the project · Flask · Python",
    status:   "Active",           // shown as a badge
    github:   "https://github.com/vasugov/my-project",  // "" to hide
    description: `Describe the project here. You can use
      <a href="https://...">links</a> inline.`,
    stack: ["Python", "Flask", "SQLite"],
    links: [
      {
        label:   "Live site",
        sub:     "myproject.govardha.net",
        url:     "https://myproject.govardha.net",
        primary: true,
      },
    ],
  },
  ── END TEMPLATE ──────────────────────────────── */

];

/* ====================================================
   RENDERER — no need to edit below this line
   ==================================================== */
function renderProjects() {
  const container = document.getElementById('project-list');

  if (PROJECTS.length === 0) {
    container.innerHTML = `
      <div style="text-align:center;padding:60px 0;color:var(--muted);">
        <p style="font-size:15px;">Projects coming soon.</p>
      </div>`;
    return;
  }

  PROJECTS.forEach((p, i) => {
    const githubBtn = p.github
      ? `<a href="${p.github}" target="_blank" rel="noopener" class="btn btn-outline">GitHub ↗</a>`
      : '';

    const stackTags = p.stack
      .map(s => `<span>${s}</span>`)
      .join('');

    const actionBtns = p.links
      .map(l => `
        <a class="action-btn${l.primary ? ' primary' : ''}"
           href="${l.url}" target="_blank" rel="noopener">
          <div class="action-btn-info">
            <span class="action-btn-name">${l.label}</span>
            ${l.sub ? `<span class="action-btn-sub">${l.sub}</span>` : ''}
          </div>
          <span class="action-btn-arrow">${l.primary ? '→' : '↗'}</span>
        </a>`)
      .join('');

    const card = document.createElement('article');
    card.className = 'project-card reveal';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-top-left">
          <h2>${p.title}</h2>
          <p class="card-sub">${p.subtitle}</p>
        </div>
        <div class="card-top-right">
          <span class="tag tag-accent">${p.status}</span>
          ${githubBtn}
        </div>
      </div>
      <div class="card-body">
        <div class="card-desc-area">
          <p>${p.description}</p>
          <div class="stack-row">${stackTags}</div>
        </div>
        <div class="card-actions">
          <div class="actions-label">Open project</div>
          ${actionBtns}
        </div>
      </div>`;
    container.appendChild(card);
  });

  /* Wire up reveal animation for freshly rendered cards */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.06 });
  container.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transitionDelay = `${i * 0.08}s`;
    io.observe(el);
  });
}

renderProjects();
</script>
</body>
</html>
