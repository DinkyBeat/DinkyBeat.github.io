<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Vasudevan Govardhanen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 16px;
  line-height: 1.7;
  color: #111;
  background: #fff;
  max-width: 740px;
  margin: 52px auto;
  padding: 0 28px 80px;
  overflow-x: hidden;
}

@media (max-width: 768px) {
  body { margin: 36px auto; padding: 0 24px 64px; }
}
@media (max-width: 540px) {
  body { margin: 28px auto; padding: 0 20px 56px; font-size: 15px; }
  h1 { font-size: 20px; }
  .post-row { padding: 12px 0; }
}

h1 {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 28px;
}

a { color: #1a52a0; }
a:visited { color: #1a52a0; }
a:hover { text-decoration: none; }

.back { font-size: 14px; margin-bottom: 32px; display: block; }

.post-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 10px 0;
  border-bottom: 1px solid #e0e0e0;
  text-decoration: none;
  color: #111;
}
.post-row:first-of-type { border-top: 1px solid #e0e0e0; }
.post-name { color: #1a52a0; }
.post-row:hover .post-name { text-decoration: underline; }
.post-date { font-size: 14px; color: #888; flex-shrink: 0; margin-left: 20px; }
</style>
</head>
<body>

<a class="back" href="/">← Vasudevan Govardhanen's Homepage</a>

<h1>Blog</h1>

<!-- To add a post:
     1. Create blog/posts/your-post.html
     2. Add: <a class="post-row" href="posts/your-post.html">
               <span class="post-name">Title</span>
               <span class="post-date">Month Year</span>
             </a>
-->

<a class="post-row" href="posts/homological-algebra.html">
  <span class="post-name">Homological Algebra</span>
  <span class="post-date">June 2024</span>
</a>

</body>
</html>
