<style>
.post-list { padding-bottom: 96px; }

/* To add a post: add an <a class="post-row"> block below */
.post-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
}
.post-row:first-child { border-top: 1px solid var(--border); }

.post-name { font-size: 15px; color: var(--text); font-weight: 400; }
.post-row:hover .post-name { text-decoration: underline; text-decoration-color: var(--muted); }
.post-date { font-size: 13px; color: var(--muted); flex-shrink: 0; margin-left: 20px; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Vasudevan Govardhanen</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/problems/">Problems</a></li>
    </ul>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-title">
    <h1>Blog</h1>
  </div>

  <div class="post-list">

    <!-- To add a post:
         1. Create blog/posts/your-post.html
         2. Add a line here:
            <a class="post-row" href="posts/your-post.html">
              <span class="post-name">Title</span>
              <span class="post-date">Month Year</span>
            </a>
    -->

    <a class="post-row" href="posts/homological-algebra.html">
      <span class="post-name">Homological Algebra</span>
      <span class="post-date">June 2024</span>
    </a>

  </div>
</div>

    <a href="mailto:vgovardhanen@gmail.com">vgovardhanen@gmail.com</a>
  </div>
</footer>
