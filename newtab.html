<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .links {
      margin-top: 20px;
    }

    .links a {
      display: inline-block;
      margin: 5px;
      padding: 10px 15px;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      text-decoration: none;
    }

    .links a:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="time"></h1>
    <input type="text" placeholder="Search..." onkeydown="search(event)">
    <div class="links">
      <a href="https://github.com">GitHub</a>
      <a href="https://chat.openai.com">ChatGPT</a>
      <a href="https://mail.google.com">Gmail</a>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    function search(e) {
      if (e.key === 'Enter') {
        const query = e.target.value;
        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      }
    }
  </script>
</body>
</html>
