<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypton — Room</title>
<link rel="stylesheet" href="/crypton/style.css">
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="game-header">
    <a href="/crypton/" class="logo-small">CRYPT<span>ON</span></a>
    <div class="room-pill" id="room-pill">Room: <strong id="room-code-display">····</strong></div>
  </div>

  <!-- Error strip -->
  <div class="error-strip" id="error-strip"></div>

  <!-- Players bar -->
  <div class="players-bar" id="players-bar">
    <div class="player-panel you">
      <div class="player-tag you-tag">You</div>
      <div class="player-handle" id="my-handle">—</div>
      <div class="player-score-val" id="my-score">0</div>
    </div>
    <div class="vs-divider">vs</div>
    <div class="player-panel them">
      <div class="player-tag" style="text-align:right">Opponent</div>
      <div class="player-handle" id="their-handle" style="text-align:right">—</div>
      <div class="player-score-val" id="their-score" style="text-align:right">—</div>
    </div>
  </div>

  <!-- Main content area (replaced each phase) -->
  <div id="main-content">
    <div class="waiting-area">
      <div class="waiting-msg">Connecting…</div>
      <div class="waiting-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

</div>

<!-- PeerJS for WebRTC peer-to-peer (no server config needed) -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
// ──────────────────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────────────────
const CLUES_PER_GAME = 5;
const TIMER_SECONDS  = 90;

// ──────────────────────────────────────────────────────
//  IDENTITY & PARAMS
// ──────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const roomCode = (params.get('room') || '').toUpperCase();
const isHost   = params.get('host') === '1';

if (!roomCode || roomCode.length !== 4) location.href = '/crypton/';

const playerId = (() => {
  let id = sessionStorage.getItem('crypton-pid');
  if (!id) { id = Math.random().toString(36).slice(2,10); sessionStorage.setItem('crypton-pid', id); }
  return id;
})();

const playerName = (() => {
  let n = sessionStorage.getItem('crypton-name');
  if (!n) {
    const adj  = ['azure','crimson','golden','silver','shadow','storm','frost','ember','void','neon'];
    const noun = ['fox','crow','wolf','hawk','bear','raven','viper','lynx','crane','moth'];
    n = `${adj[Math.floor(Math.random()*adj.length)]} ${noun[Math.floor(Math.random()*noun.length)]}`;
    sessionStorage.setItem('crypton-name', n);
  }
  return n;
})();

// ──────────────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────────────
const state = {
  phase: 'connecting',
  me:    { name: playerName, score: 0 },
  opp:   { name: null, score: 0 },
  clues: [],
  clueOrder:          [],
  currentPos:         0,
  timerVal:           TIMER_SECONDS,
  timerInterval:      null,
  clueWon:            false,
  myAnsweredCorrectly:false,
  myAnswerTime:       null,
};

let peer = null;
let conn = null; // active DataConnection to the other player

// ──────────────────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────────────────
document.getElementById('room-code-display').textContent = roomCode;
document.getElementById('my-handle').textContent = playerName;

async function init() {
  try {
    const res   = await fetch('/crypton/clues.json');
    state.clues = (await res.json()).clues;
  } catch {
    showError('Failed to load clue bank. Please refresh.');
    return;
  }
  isHost ? initHost() : initGuest();
}

// ──────────────────────────────────────────────────────
//  HOST SETUP
//  Host claims the deterministic peer ID "crypton-XXXX"
// ──────────────────────────────────────────────────────
function initHost() {
  peer = new Peer(`crypton-${roomCode}`);

  peer.on('open', () => {
    renderWaiting();
  });

  peer.on('connection', (c) => {
    if (conn) { c.close(); return; } // reject extra players
    conn = c;
    conn.on('open',  ()    => conn.send({ event: 'player_info', name: playerName }));
    conn.on('data',  (msg) => handleMessage(msg));
    conn.on('close', ()    => onOpponentLeft());
    conn.on('error', ()    => onOpponentLeft());
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      showError('Room code already active. Please create a new room.');
    } else {
      showError(`Connection error (${err.type}). Please refresh.`);
    }
  });
}

// ──────────────────────────────────────────────────────
//  GUEST SETUP
//  Guest connects to "crypton-XXXX"
// ──────────────────────────────────────────────────────
function initGuest() {
  peer = new Peer();          // random ID for the guest

  peer.on('open', () => {
    conn = peer.connect(`crypton-${roomCode}`, { reliable: true, serialization: 'json' });

    conn.on('open', () => {
      conn.send({ event: 'player_info', name: playerName });
      renderWaiting();
    });

    conn.on('data',  (msg) => handleMessage(msg));
    conn.on('close', ()    => onOpponentLeft());
    conn.on('error', ()    => onOpponentLeft());
  });

  peer.on('error', (err) => {
    if (err.type === 'peer-unavailable') {
      showError('Room not found. Make sure the host has loaded their room first, then refresh.');
    } else {
      showError(`Connection error (${err.type}). Please refresh.`);
    }
  });
}

// ──────────────────────────────────────────────────────
//  MESSAGING
// ──────────────────────────────────────────────────────
function send(msg) {
  if (conn && conn.open) conn.send(msg);
}

function handleMessage(msg) {
  switch (msg.event) {
    case 'player_info':   onPlayerInfo(msg);   break;
    case 'game_start':    onGameStart(msg);    break;
    case 'player_answer': onPlayerAnswer(msg); break;
    case 'clue_result':   onClueResult(msg);   break;
    case 'next_clue':     onNextClue(msg);     break;
    case 'game_over':     onGameOver(msg);     break;
  }
}

function onPlayerInfo({ name }) {
  state.opp.name = name;
  document.getElementById('their-handle').textContent = name;
  document.getElementById('their-score').textContent  = '0';
  if (isHost) enableStartBtn();
}

// ──────────────────────────────────────────────────────
//  WAITING PHASE
// ──────────────────────────────────────────────────────
function renderWaiting() {
  state.phase = 'waiting';
  document.getElementById('main-content').innerHTML = `
    <div class="waiting-area">
      <div class="waiting-msg">Share this room code with your opponent</div>
      <div class="waiting-code-display">${roomCode}</div>
      <div><button class="copy-btn" onclick="copyCode()">copy code</button></div>
      <div class="waiting-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="waiting-msg" id="wait-status">
        ${isHost ? 'Waiting for opponent to join…' : 'Waiting for host to start…'}
      </div>
      ${isHost
        ? '<button class="btn btn-primary" id="start-btn" disabled onclick="startGame()" style="margin-top:1.75rem;opacity:0.35;">Start Game</button>'
        : ''}
    </div>`;
}

function enableStartBtn() {
  const btn = document.getElementById('start-btn');
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  const st = document.getElementById('wait-status');
  if (st) st.textContent = 'Both players connected. Ready!';
}

// ──────────────────────────────────────────────────────
//  GAME START
// ──────────────────────────────────────────────────────
function startGame() {
  if (!isHost) return;
  const order = shuffle(state.clues.map((_,i)=>i)).slice(0, CLUES_PER_GAME);
  state.clueOrder = order;
  send({ event: 'game_start', clueOrder: order });
  beginClue(0);
}

function onGameStart({ clueOrder }) {
  state.clueOrder = clueOrder;
  beginClue(0);
}

// ──────────────────────────────────────────────────────
//  CLUE LOOP
// ──────────────────────────────────────────────────────
function beginClue(pos) {
  state.phase               = 'playing';
  state.currentPos          = pos;
  state.clueWon             = false;
  state.myAnsweredCorrectly = false;
  state.myAnswerTime        = null;
  renderClue(state.clues[state.clueOrder[pos]], pos);
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerVal = TIMER_SECONDS;
  updateTimerEl();
  state.timerInterval = setInterval(() => {
    state.timerVal--;
    updateTimerEl();
    if (state.timerVal <= 0) {
      clearInterval(state.timerInterval);
      if (isHost && state.phase === 'playing' && !state.clueWon) {
        state.clueWon = true;
        resolveClue(null);       // nobody scored
      }
    }
  }, 1000);
}

// Called from inline onclick
function submitAnswer() {
  if (state.phase !== 'playing' || state.myAnsweredCorrectly) return;
  const input = document.getElementById('answer-input');
  if (!input) return;
  const answer = input.value.trim().toUpperCase();
  if (!answer) return;

  const clue    = state.clues[state.clueOrder[state.currentPos]];
  const correct = (answer === clue.answer);
  const time    = Date.now();

  send({ event: 'player_answer', answer, correct, time });

  if (correct) {
    state.myAnsweredCorrectly = true;
    state.myAnswerTime        = time;
    showStatusMsg('correct', 'Correct!');
    flashClueBox();
    if (isHost && !state.clueWon) {
      state.clueWon = true;
      clearInterval(state.timerInterval);
      resolveClue('me');  // host = "me"
    }
    // guest: wait for host to broadcast clue_result
  } else {
    showStatusMsg('wrong', 'Wrong — try again!');
    input.value = '';
    input.focus();
    setTimeout(() => { const s = document.getElementById('status-row'); if (s) s.innerHTML = ''; }, 1500);
  }
}

function onPlayerAnswer({ answer, correct, time }) {
  // Received from the opponent
  if (correct) {
    setOppStatus(`${state.opp.name || 'Opponent'} answered!`);
    if (isHost && state.phase === 'playing' && !state.clueWon) {
      state.clueWon = true;
      clearInterval(state.timerInterval);
      // Both answered correctly: earlier timestamp wins
      const winner = (state.myAnsweredCorrectly && state.myAnswerTime <= time) ? 'me' : 'opp';
      resolveClue(winner);
    }
  } else {
    setOppStatus(`${state.opp.name || 'Opponent'}: wrong attempt`);
    setTimeout(() => setOppStatus(''), 2000);
  }
}

// ──────────────────────────────────────────────────────
//  RESOLVE CLUE  (host-only: broadcasts result to guest)
//  winner: 'me' = host won, 'opp' = guest won, null = nobody
// ──────────────────────────────────────────────────────
function resolveClue(winner) {
  if (winner === 'me')  state.me.score++;
  if (winner === 'opp') state.opp.score++;

  const clue = state.clues[state.clueOrder[state.currentPos]];

  // Send to guest with scores from their perspective
  send({
    event:    'clue_result',
    winner:   winner === 'me' ? 'opp' : winner === 'opp' ? 'me' : null,  // flip perspective
    clue,
    myScore:  state.opp.score,   // guest's own score
    oppScore: state.me.score,    // host's score (guest's "opp")
  });

  showReveal(winner, clue);
}

function onClueResult({ winner, clue, myScore, oppScore }) {
  clearInterval(state.timerInterval);
  state.me.score  = myScore;
  state.opp.score = oppScore;
  showReveal(winner, clue);
}

// ──────────────────────────────────────────────────────
//  REVEAL PHASE
// ──────────────────────────────────────────────────────
function showReveal(winner, clue) {
  // winner: 'me' | 'opp' | null   — always from the current player's perspective
  state.phase = 'revealed';
  clearInterval(state.timerInterval);
  updateScoreDisplay();

  let wClass = 'nobody', wText = 'Nobody solved it in time';
  if (winner === 'me')  { wClass = 'you';  wText = 'You solved it!'; }
  if (winner === 'opp') { wClass = 'them'; wText = `${cap(state.opp.name || 'Opponent')} solved it`; }

  const isLast    = state.currentPos >= CLUES_PER_GAME - 1;
  const nextLabel = isLast ? 'View Results →' : 'Next Clue →';

  document.getElementById('main-content').innerHTML = `
    <div class="reveal-block">
      <div class="reveal-answer">${esc(clue.answer)}</div>
      <div class="reveal-winner ${wClass}">${esc(wText)}</div>
      <div class="reveal-breakdown">
        <strong>Definition</strong><br>${esc(clue.definition)}<br><br>
        <strong>Indicator${clue.indicators.length > 1 ? 's' : ''}</strong><br>${esc(clue.indicators.join(', '))}<br><br>
        <strong>Fodder</strong><br>${esc(clue.fodder)}<br><br>
        ${esc(clue.explanation)}
      </div>
    </div>
    <div class="reveal-actions">
      ${isHost
        ? `<button class="btn btn-primary" onclick="advanceClue()">${nextLabel}</button>`
        : '<span class="msg-dim" style="font-size:0.7rem;letter-spacing:0.15em">Waiting for host…</span>'}
    </div>`;
}

// ──────────────────────────────────────────────────────
//  ADVANCE  (host-only)
// ──────────────────────────────────────────────────────
function advanceClue() {
  if (!isHost) return;
  const nextPos = state.currentPos + 1;
  if (nextPos >= CLUES_PER_GAME) {
    send({ event: 'game_over', myScore: state.opp.score, oppScore: state.me.score });
    renderGameOver();
  } else {
    send({ event: 'next_clue', pos: nextPos });
    beginClue(nextPos);
  }
}

function onNextClue({ pos }) { beginClue(pos); }

function onGameOver({ myScore, oppScore }) {
  clearInterval(state.timerInterval);
  state.me.score  = myScore;
  state.opp.score = oppScore;
  renderGameOver();
}

// ──────────────────────────────────────────────────────
//  GAME OVER
// ──────────────────────────────────────────────────────
function renderGameOver() {
  state.phase = 'finished';
  clearInterval(state.timerInterval);
  updateScoreDisplay();

  const me = state.me.score, them = state.opp.score;
  let wClass, wText;
  if (me > them)      { wClass='you';  wText='You win!'; }
  else if (them > me) { wClass='them'; wText=`${cap(state.opp.name||'Opponent')} wins!`; }
  else                { wClass='tie';  wText="It's a draw!"; }

  document.getElementById('main-content').innerHTML = `
    <div class="gameover-area">
      <div class="gameover-label">Game Over · ${CLUES_PER_GAME} clues</div>
      <div class="winner-headline ${wClass}">${esc(wText)}</div>
      <div class="final-scores">
        <div class="final-score-item">
          <div class="fs-name">You</div>
          <div class="fs-score">${me}</div>
        </div>
        <div class="final-score-item">
          <div class="fs-name">${esc(state.opp.name||'Opponent')}</div>
          <div class="fs-score">${them}</div>
        </div>
      </div>
      <a href="/crypton/" class="btn btn-secondary" style="text-decoration:none;">Play Again</a>
    </div>`;
}

// ──────────────────────────────────────────────────────
//  DISCONNECT
// ──────────────────────────────────────────────────────
function onOpponentLeft() {
  if (state.phase === 'playing' || state.phase === 'revealed') {
    clearInterval(state.timerInterval);
    showError('Opponent disconnected.');
    state.phase = 'finished';
    document.getElementById('main-content').innerHTML = `
      <div class="waiting-area">
        <div class="waiting-msg" style="color:var(--wrong)">Opponent disconnected</div>
        <a href="/crypton/" class="btn btn-secondary" style="text-decoration:none;margin-top:2rem;">Return to Lobby</a>
      </div>`;
  }
}

// ──────────────────────────────────────────────────────
//  CLUE RENDER
// ──────────────────────────────────────────────────────
function renderClue(clue, pos) {
  document.getElementById('main-content').innerHTML = `
    <div class="clue-meta">
      <div class="clue-number">Clue ${pos+1} / ${CLUES_PER_GAME}</div>
      <div class="timer" id="timer-el">${fmtTime(state.timerVal)}</div>
    </div>
    <div class="type-badge">${esc(clue.type)}</div>
    <div class="clue-box" id="clue-box">
      <div class="clue-text">${esc(clue.clue)}</div>
    </div>
    <div class="answer-area">
      <input type="text" id="answer-input" maxlength="20" placeholder="your answer"
             autocomplete="off" spellcheck="false"
             oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter')submitAnswer()">
      <button class="btn btn-primary" onclick="submitAnswer()">Submit</button>
    </div>
    <div class="status-row" id="status-row"></div>
    <div class="status-row" id="opp-status"></div>`;
  document.getElementById('answer-input').focus();
  updateScoreDisplay();
}

// ──────────────────────────────────────────────────────
//  UI HELPERS
// ──────────────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('my-handle').textContent    = state.me.name;
  document.getElementById('my-score').textContent     = state.me.score;
  document.getElementById('their-handle').textContent = state.opp.name || '—';
  document.getElementById('their-score').textContent  = state.opp.name !== null ? state.opp.score : '—';
}

function updateTimerEl() {
  const el = document.getElementById('timer-el');
  if (!el) return;
  el.textContent = fmtTime(state.timerVal);
  el.className = 'timer';
  if (state.timerVal <= 10)      el.classList.add('danger');
  else if (state.timerVal <= 30) el.classList.add('warn');
}

function showStatusMsg(type, text) {
  const el = document.getElementById('status-row');
  if (!el) return;
  const cls = type==='correct' ? 'msg-correct' : type==='wrong' ? 'msg-wrong' : 'msg-dim';
  el.innerHTML = `<span class="${cls}">${esc(text)}</span>`;
}

function setOppStatus(text) {
  const el = document.getElementById('opp-status');
  if (el) el.innerHTML = text ? `<span class="msg-opp">${esc(text)}</span>` : '';
}

function flashClueBox() {
  const box = document.getElementById('clue-box');
  if (!box) return;
  box.classList.add('flash-correct');
  setTimeout(() => box.classList.remove('flash-correct'), 600);
}

function showError(msg) {
  const el = document.getElementById('error-strip');
  el.textContent = msg;
  el.classList.add('visible');
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent='copied!'; setTimeout(()=>{ btn.textContent='copy code'; }, 2000); }
  }).catch(()=>{});
}

// ──────────────────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function fmtTime(s) {
  return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}
function esc(str) {
  return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cap(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }

// ──────────────────────────────────────────────────────
//  GO
// ──────────────────────────────────────────────────────
init();
</script>

</body>
</html>
