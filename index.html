<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasudevan Govardhanen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>

/* ── Base override: full-bleed, no scroll ───────────────────── */
html, body { height: 100%; overflow: hidden; margin: 0; background: #000; }

/* ── INTRO ──────────────────────────────────────────────────── */
#intro {
  position: fixed; inset: 0;
  z-index: 10000; background: #000; cursor: crosshair;
}
#up-canvas { display: block; width: 100%; height: 100%; }

#intro-label {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Space Mono', monospace;
  font-size: clamp(11px, 1.9vw, 17px);
  color: rgba(255,255,255,0.88);
  letter-spacing: 0.38em;
  pointer-events: none; z-index: 10001;
  text-align: center; white-space: nowrap;
  animation: label-breathe 3.2s ease-in-out infinite;
  transition: opacity 0.4s ease;
}
@keyframes label-breathe {
  0%, 100% { opacity: 0.30; }
  50%       { opacity: 1.00; }
}
#intro-hint {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.30em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  pointer-events: none; z-index: 10001;
  animation: hint-pulse 3.2s ease-in-out infinite;
  transition: opacity 0.3s ease;
}
@keyframes hint-pulse {
  0%, 100% { opacity: 0.18; }
  50%       { opacity: 0.55; }
}

/* ── MAIN PAGE (revealed after intro) ──────────────────────── */
#main-page {
  position: fixed; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.9s ease;
}
#main-page.visible {
  opacity: 1; pointer-events: all;
}

/* ── Security cam canvas ────────────────────────────────────── */
#cam-canvas {
  position: absolute; inset: 0;
  display: block; width: 100%; height: 100%;
}

/* ── Global scanline ────────────────────────────────────────── */
.scanline {
  position: fixed; left: 0; top: 0; width: 100%; height: 2px;
  background: linear-gradient(to right,
    transparent 0%,
    rgba(100,200,100,0.05) 50%,
    transparent 100%);
  pointer-events: none; z-index: 9998;
  animation: scan-line 7s linear infinite;
}

/* ── Cyborg arm nav ─────────────────────────────────────────── */
#arm-nav {
  position: fixed; left: 0; top: 0;
  width: 360px; height: 100vh;
  pointer-events: none;
  z-index: 500;
}
#arm-nav.ready { pointer-events: all; }

#arm-svg {
  position: absolute; left: 0; top: 0;
  width: 360px; height: 100%;
  overflow: visible;
}

/* Shoulder trigger */
#shoulder-trigger { cursor: pointer; }
#shoulder-outer {
  animation: shoulder-pulse 2.4s ease-in-out infinite;
}
@keyframes shoulder-pulse {
  0%, 100% { opacity: 0.50; }
  50%       { opacity: 1.00; }
}

/* Upper arm — extends horizontally (left→right) */
#arm-upper-g {
  transform-box: fill-box;
  transform-origin: left center;
  transform: scaleX(0);
  transition: transform 0.60s cubic-bezier(0.77, 0, 0.18, 1);
}
/* Forearm — drops vertically from elbow */
#arm-lower-g {
  transform-box: fill-box;
  transform-origin: center top;
  transform: scaleY(0);
  transition: transform 0.50s cubic-bezier(0.77, 0, 0.18, 1) 0.50s;
}
/* Nav items fade in after arm is fully extended */
#arm-nav-items {
  opacity: 0;
  transition: opacity 0.35s ease 0.95s;
}
#arm-nav.open #arm-upper-g { transform: scaleX(1); }
#arm-nav.open #arm-lower-g { transform: scaleY(1); }
#arm-nav.open #arm-nav-items { opacity: 1; }

/* SVG nav link text */
.arm-link-text {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  fill: rgba(100, 200, 100, 0.65);
  cursor: pointer;
  transition: fill 0.15s;
}
.arm-link-text:hover { fill: rgba(160, 255, 160, 0.95); }

</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// INTRO — Unknown Pleasures waveform + auto-pulse + shockwave tear
// ═══════════════════════════════════════════════════════════════
(function () {
  const introEl = document.getElementById('intro');
  const labelEl = document.getElementById('intro-label');
  const hintEl  = document.getElementById('intro-hint');
  const canvas  = document.getElementById('up-canvas');
  const ctx     = canvas.getContext('2d');

  let W, H, done = false, rafId, startTs = null, shockwave = null;
  const mouse = { x: -9999, y: -9999 };
  const AUTO_PERIOD = 2200; // ms per auto-pulse cycle

  // Seeded LCG RNG — seed = pulsar PSR B1919+21
  function makeRng(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
  }

  const NL = 80, PTS = 300;
  let waves;

  function gauss(x, mu, sig) { return Math.exp(-0.5 * ((x - mu) / sig) ** 2); }

  function lineAmp(i) {
    const t = i / (NL - 1);
    return 0.07 + gauss(t, 0.58, 0.14) * 0.93;
  }

  function buildWaves() {
    const rng = makeRng(1919);
    waves = Array.from({ length: NL }, (_, i) => {
      const a   = lineAmp(i);
      // All random params computed ONCE per line — never inside the point loop
      const pkC = 0.27 + (rng() - 0.5) * 0.03,  pkS = 0.030 + rng() * 0.016;
      const s1C = 0.50 + (rng() - 0.5) * 0.09,  s1S = 0.018 + rng() * 0.014;
      const s2C = 0.70 + (rng() - 0.5) * 0.12,  s2S = 0.020 + rng() * 0.012;
      const s2g = rng() > 0.5 ? 1 : -1;
      const row = new Float32Array(PTS);
      for (let j = 0; j < PTS; j++) {
        const t = j / (PTS - 1);
        let y = (rng() - 0.5) * 0.04;            // point noise
        y += a        * gauss(t, pkC, pkS);        // main peak
        y += a * 0.30 * gauss(t, s1C, s1S);        // secondary
        y += a * 0.11 * s2g * gauss(t, s2C, s2S);  // tertiary
        row[j] = Math.max(0, y);
      }
      return row;
    });
  }

  function mouseDisp(x, by) {
    const d = Math.hypot(x - mouse.x, by - mouse.y);
    if (d > 155) return 0;
    return (1 - d / 155) ** 2 * 60;
  }

  function shockDisp(x, by, sw) {
    const d    = Math.hypot(x - sw.x, by - sw.y);
    const diff = d - sw.radius;
    if (Math.abs(diff) > 125) return 0;
    return Math.sin(-diff / 11) * Math.exp(-Math.abs(diff) / 42) * 105;
  }

  // Continuous gentle auto-pulse — makes waveform feel alive before click
  function pulseDisp(x, by, ts) {
    if (!startTs) return 0;
    const phase = ((ts - startTs) % AUTO_PERIOD) / AUTO_PERIOD;
    const R     = phase * Math.hypot(W, H) * 0.82;
    const amp   = (1 - phase) * 42;
    const d     = Math.hypot(x - W * 0.5, by - H * 0.5);
    const diff  = d - R;
    if (Math.abs(diff) > 68) return 0;
    return Math.sin(-diff / 9) * Math.exp(-Math.abs(diff) / 27) * amp;
  }

  function frame(ts) {
    if (done) return;
    rafId = requestAnimationFrame(frame);
    if (!startTs) startTs = ts;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (shockwave) shockwave.radius = (ts - shockwave.birthTs) / 1000 * 920;

    const spacing = H / (NL + 3);
    const scale   = spacing * 4.4;

    for (let i = 0; i < NL; i++) {
      const by  = H - spacing - i * spacing;
      const row = waves[i];
      const xs  = new Float32Array(PTS);
      const ys  = new Float32Array(PTS);

      for (let j = 0; j < PTS; j++) {
        xs[j] = (j / (PTS - 1)) * W;
        let dy = row[j] * scale
               + mouseDisp(xs[j], by)
               + pulseDisp(xs[j], by, ts);
        if (shockwave) dy += shockDisp(xs[j], by, shockwave);
        ys[j] = by - dy;
      }

      // Black fill to canvas bottom — masks all lines below this one
      ctx.beginPath();
      ctx.moveTo(0, H + 2);
      for (let j = 0; j < PTS; j++) ctx.lineTo(xs[j], ys[j]);
      ctx.lineTo(W, H + 2);
      ctx.closePath();
      ctx.fillStyle = '#000';
      ctx.fill();

      // White trace line
      ctx.beginPath();
      ctx.moveTo(xs[0], ys[0]);
      for (let j = 1; j < PTS; j++) ctx.lineTo(xs[j], ys[j]);
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Expanding tear — destination-out cuts a hole revealing the site underneath
    if (shockwave) {
      const { x, y, radius } = shockwave;
      const inner = Math.max(0, radius - 155);
      ctx.globalCompositeOperation = 'destination-out';
      const g = ctx.createRadialGradient(x, y, inner, x, y, radius);
      g.addColorStop(0, 'rgba(0,0,0,1)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'source-over';
      if (inner > Math.hypot(W, H)) finish();
    }
  }

  function finish() {
    done = true;
    cancelAnimationFrame(rafId);
    [introEl, labelEl, hintEl].forEach(el => {
      el.style.transition = 'opacity 0.55s ease';
      el.style.opacity    = '0';
    });
    document.body.style.overflow = '';
    setTimeout(revealPage, 200);
    setTimeout(() => [introEl, labelEl, hintEl].forEach(el => el.remove()), 750);
  }

  window.addEventListener('resize', () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });
  canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  canvas.addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; });

  function trigger(x, y) {
    if (shockwave) return;
    [labelEl, hintEl].forEach(el => {
      el.style.transition = 'opacity 0.2s';
      el.style.opacity    = '0';
    });
    shockwave = { x, y, radius: 0, birthTs: performance.now() };
  }

  canvas.addEventListener('click', e => trigger(e.clientX, e.clientY));
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    trigger(t.clientX, t.clientY);
  }, { passive: false });

  // Boot
  document.body.style.overflow = 'hidden';
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildWaves();
  requestAnimationFrame(frame);
})();

// ═══════════════════════════════════════════════════════════════
// ARM NAV TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleArm() {
  document.getElementById('arm-nav').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
// PAGE REVEAL (fires after intro shockwave tears open)
// ═══════════════════════════════════════════════════════════════
function revealPage() {
  document.getElementById('main-page').classList.add('visible');
  document.getElementById('arm-nav').classList.add('ready');
  startCam();
  // Arm auto-deploys after a beat — like the machine waking up
  setTimeout(() => document.getElementById('arm-nav').classList.add('open'), 700);
}

// ═══════════════════════════════════════════════════════════════
// SECURITY CAM CANVAS — brutalist night scene
// ═══════════════════════════════════════════════════════════════
let camStarted = false;
function startCam() {
  if (camStarted) return;
  camStarted = true;

  const canvas = document.getElementById('cam-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, buildings = [], t = 0, glitchFrames = 0;

  // Seeded RNG — produces reproducible building layout
  function seededRng(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
  }

  // Window flicker state
  const winStates = {};

  function genBuildings(w, h) {
    const rng     = seededRng(42);
    const groundY = h * 0.60;
    buildings = [];
    let x = -40;

    while (x < w + 80) {
      const isTower = rng() > 0.38;
      const bw = isTower
        ? 28 + rng() * 58
        : 65 + rng() * 140;
      const bh = isTower
        ? h * (0.30 + rng() * 0.44)
        : h * (0.08 + rng() * 0.20);
      const gap  = rng() * 14 - 2;
      const cols = Math.max(1, Math.floor(bw / 13));
      const rows = Math.max(1, Math.floor(bh / 15));

      const windows = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const key = `${Math.floor(x)}_${r}_${c}`;
          if (!(key in winStates)) {
            winStates[key] = {
              lit:     rng() > 0.52,
              flicker: rng() > 0.85,
            };
          }
          windows.push({ r, c, key });
        }
      }

      buildings.push({
        x, y: groundY - bh,
        w: bw, h: bh,
        cols, rows, windows,
        isTower,
        groundY,
      });
      x += bw + gap;
    }
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    genBuildings(W, H);
  }

  function drawFrame() {
    // ── Sky ──
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.62);
    sky.addColorStop(0,    '#000800');
    sky.addColorStop(0.45, '#010d01');
    sky.addColorStop(1,    '#021502');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // ── Ground / road ──
    const groundY = H * 0.60;
    const grd = ctx.createLinearGradient(0, groundY, 0, H);
    grd.addColorStop(0, '#010e01');
    grd.addColorStop(1, '#000600');
    ctx.fillStyle = grd;
    ctx.fillRect(0, groundY, W, H - groundY);

    // Wet road sheen
    ctx.fillStyle = 'rgba(60,130,60,0.05)';
    ctx.fillRect(0, groundY + 2, W, 14);

    // ── Buildings ──
    buildings.forEach(b => {
      // Drop shadow (depth)
      ctx.fillStyle = '#020702';
      ctx.fillRect(b.x + 5, b.y + 7, b.w, b.h);

      // Main wall
      ctx.fillStyle = b.isTower ? '#0a1a0a' : '#0c1c0c';
      ctx.fillRect(b.x, b.y, b.w, b.h);

      // Brutalist concrete floor bands
      ctx.fillStyle = 'rgba(20,45,20,0.35)';
      const bandStep = b.isTower ? 24 : 30;
      for (let fb = 1; fb <= Math.ceil(b.h / bandStep); fb++) {
        ctx.fillRect(b.x, b.y + fb * bandStep - 1, b.w, 1.5);
      }

      // Vertical pillar lines
      if (b.isTower) {
        ctx.strokeStyle = 'rgba(20,45,20,0.25)';
        ctx.lineWidth = 1;
        for (let pc = 1; pc < b.cols; pc++) {
          const px = b.x + (b.w / b.cols) * pc;
          ctx.beginPath();
          ctx.moveTo(px, b.y);
          ctx.lineTo(px, b.y + b.h);
          ctx.stroke();
        }
      }

      // Windows
      const cellW = b.w / b.cols;
      const cellH = b.h / b.rows;
      b.windows.forEach(({ r, c, key }) => {
        const ws = winStates[key];
        if (!ws) return;

        if (ws.flicker && Math.random() < 0.006) ws.lit = !ws.lit;

        const wx = b.x + c * cellW + cellW * 0.18;
        const wy = b.y + r * cellH + cellH * 0.20;
        const ww = cellW * 0.64;
        const wh = cellH * 0.55;

        if (ws.lit) {
          ctx.fillStyle = 'rgba(85,185,85,0.26)';
          ctx.fillRect(wx, wy, ww, wh);
          // Glow
          ctx.fillStyle = 'rgba(60,140,60,0.07)';
          ctx.fillRect(wx - 2, wy - 2, ww + 4, wh + 4);
        } else {
          ctx.fillStyle = 'rgba(4,10,4,0.80)';
          ctx.fillRect(wx, wy, ww, wh);
        }
      });

      // Rooftop antennas / water towers
      if ((b.x | 0) % 3 === 0) {
        const ax = b.x + b.w * 0.35 + ((b.x * 7) % (b.w * 0.5));
        const ah = 10 + ((b.x * 13) % 20);
        ctx.strokeStyle = 'rgba(60,130,60,0.30)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ax, b.y);
        ctx.lineTo(ax, b.y - ah);
        ctx.stroke();
        // Crossbar
        ctx.beginPath();
        ctx.moveTo(ax - 5, b.y - ah * 0.7);
        ctx.lineTo(ax + 5, b.y - ah * 0.7);
        ctx.stroke();
      }
    });

    // ── Glitch: horizontal slice displacement ──
    if (glitchFrames > 0) {
      const sy  = H * 0.15 + Math.random() * H * 0.55;
      const sh  = 3 + Math.random() * 14 | 0;
      const sdx = (Math.random() - 0.5) * 28 | 0;
      try {
        const id = ctx.getImageData(0, sy | 0, W, sh);
        ctx.putImageData(id, sdx, sy | 0);
      } catch (e) {}
      glitchFrames--;
    }
    if (Math.random() < 0.005) glitchFrames = 2 + Math.random() * 4 | 0;

    // ── Identity text overlay ──
    const cx  = W * 0.5;
    const cy  = H * 0.38;
    const fsz = Math.max(14, Math.floor(W * 0.036));

    ctx.save();
    ctx.textAlign = 'center';

    // Chromatic aberration ghost
    ctx.fillStyle = 'rgba(200,60,60,0.14)';
    ctx.font = `700 ${fsz}px 'Space Mono', monospace`;
    ctx.fillText('VASUDEVAN GOVARDHANEN', cx + 3, cy);
    ctx.fillStyle = 'rgba(60,60,200,0.14)';
    ctx.fillText('VASUDEVAN GOVARDHANEN', cx - 3, cy);
    // Main name
    ctx.fillStyle = 'rgba(120,220,120,0.90)';
    ctx.font = `700 ${fsz}px 'Space Mono', monospace`;
    ctx.fillText('VASUDEVAN GOVARDHANEN', cx, cy);

    // Horizontal rule under name
    const ruleW = Math.min(fsz * 14, W * 0.55);
    ctx.strokeStyle = 'rgba(80,180,80,0.30)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(cx - ruleW / 2, cy + 12);
    ctx.lineTo(cx + ruleW / 2, cy + 12);
    ctx.stroke();

    // Descriptors
    const dfsz = Math.max(9, Math.floor(W * 0.011));
    const descs = [
      'HS SENIOR  ·  MANALAPAN, NEW JERSEY',
      'COMPUTING ARCHITECTURE  /  OS  /  PARALLEL COMPUTING',
      'GOFAR INITIATIVE  ·  SNE @ MANALAPAN HS',
    ];
    ctx.font = `400 ${dfsz}px 'Space Mono', monospace`;
    descs.forEach((d, i) => {
      ctx.fillStyle = `rgba(80,185,80,${0.55 - i * 0.10})`;
      ctx.fillText(d, cx, cy + 28 + i * (dfsz * 2.0));
    });

    ctx.restore();

    // ── Film grain (fast sparse pixels) ──
    const grainN = (W * H * 0.006) | 0;
    for (let n = 0; n < grainN; n++) {
      const gx = Math.random() * W | 0;
      const gy = Math.random() * H | 0;
      const gv = Math.random();
      ctx.fillStyle = `rgba(60,${100 + (gv * 80) | 0},60,${0.06 + gv * 0.10})`;
      ctx.fillRect(gx, gy, 1, 1);
    }

    // ── Scanlines (static) ──
    for (let y = 0; y < H; y += 3) {
      ctx.fillStyle = 'rgba(0,0,0,0.10)';
      ctx.fillRect(0, y, W, 1);
    }

    // ── Moving scan beam ──
    const beamY = (t * 55) % H;
    ctx.fillStyle = 'rgba(80,200,80,0.025)';
    ctx.fillRect(0, beamY, W, 4);

    // ── Vignette ──
    const vig = ctx.createRadialGradient(cx, H * 0.5, H * 0.18, cx, H * 0.5, H * 0.82);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,6,0,0.90)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // ── HUD overlay ──
    ctx.save();
    ctx.font = `400 11px 'Space Mono', monospace`;

    // Top-left: cam ID + sector
    ctx.fillStyle = 'rgba(80,200,80,0.62)';
    ctx.textAlign = 'left';
    ctx.fillText('CAM-01  ·  SECTOR 7  ·  NV-MODE', 22, 26);

    // Top-right: live timestamp
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const ts  = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    ctx.textAlign = 'right';
    ctx.fillText(ts, W - 22, 26);

    // Bottom-left: REC blink (every ~0.8s)
    if (Math.floor(t * 1.25) % 2 === 0) {
      ctx.fillStyle = 'rgba(220,70,70,0.82)';
      ctx.textAlign = 'left';
      ctx.fillText('● REC', 22, H - 20);
    }

    // Bottom-right: site credit
    ctx.fillStyle = 'rgba(80,200,80,0.38)';
    ctx.textAlign = 'right';
    ctx.fillText('GOVARDHA.NET  //  2026', W - 22, H - 20);

    // Corner brackets (HUD frame)
    const bl = 20;
    ctx.strokeStyle = 'rgba(80,200,80,0.32)';
    ctx.lineWidth   = 1.5;
    // TL
    ctx.beginPath(); ctx.moveTo(12, 12 + bl); ctx.lineTo(12, 12); ctx.lineTo(12 + bl, 12); ctx.stroke();
    // TR
    ctx.beginPath(); ctx.moveTo(W - 12 - bl, 12); ctx.lineTo(W - 12, 12); ctx.lineTo(W - 12, 12 + bl); ctx.stroke();
    // BL
    ctx.beginPath(); ctx.moveTo(12, H - 12 - bl); ctx.lineTo(12, H - 12); ctx.lineTo(12 + bl, H - 12); ctx.stroke();
    // BR
    ctx.beginPath(); ctx.moveTo(W - 12 - bl, H - 12); ctx.lineTo(W - 12, H - 12); ctx.lineTo(W - 12, H - 12 - bl); ctx.stroke();

    ctx.restore();

    t += 0.016;
    requestAnimationFrame(drawFrame);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(drawFrame);
}
</script>
