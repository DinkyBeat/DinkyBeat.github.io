<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasudevan Govardhanen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; cursor: grab; }
body:active { cursor: grabbing; }

/* ── INTRO ── */
#intro {
  position: fixed; inset: 0; z-index: 10000;
  background: #000; cursor: crosshair;
}
#up-canvas { display: block; width: 100%; height: 100%; }
#intro-label {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Space Mono', monospace;
  font-size: clamp(10px, 1.8vw, 16px);
  color: rgba(255,255,255,0.80);
  letter-spacing: 0.40em;
  pointer-events: none; z-index: 10001;
  text-align: center; white-space: nowrap;
  animation: lbl-breathe 3.2s ease-in-out infinite;
}
@keyframes lbl-breathe { 0%,100%{opacity:.28} 50%{opacity:1} }
#intro-hint {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase;
  color: rgba(255,255,255,0.16);
  pointer-events: none; z-index: 10001;
  animation: lbl-breathe 3.2s ease-in-out infinite;
}

/* ── 3D WORLD ── */
#world {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0; transition: opacity 1.2s ease;
}
#world.visible { opacity: 1; }
#world canvas { display: block; width: 100% !important; height: 100% !important; }

/* ── Vignette overlay ── */
#vignette {
  position: fixed; inset: 0; z-index: 50;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 38%, rgba(0,4,12,0.65) 100%);
}

/* ── Scanline ── */
#scanline {
  position: fixed; left: 0; top: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(160,180,220,0.04), transparent);
  pointer-events: none; z-index: 200;
  animation: scan 8s linear infinite;
}
@keyframes scan { from{top:-2px} to{top:100vh} }

/* ── Drag cursor message ── */
#cursor-msg {
  position: fixed; z-index: 9999;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  color: rgba(170,190,240,0.72);
  pointer-events: none; white-space: nowrap;
  opacity: 0; transition: opacity 0.18s ease;
  transform: translate(16px, 12px);
}
#cursor-msg.active { opacity: 1; }

/* ── Drag hint (bottom-center, fades out) ── */
#drag-hint {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase;
  color: rgba(140,160,210,0.32);
  pointer-events: none; z-index: 100;
  opacity: 0; transition: opacity 0.8s ease 1.2s;
  animation: lbl-breathe 3.5s ease-in-out infinite;
}
#drag-hint.visible { opacity: 1; }

</style>
</head>
<body>

<!-- INTRO -->
<div id="intro"><canvas id="up-canvas"></canvas></div>
<div id="intro-label">[ NEW DAWN FADES ]</div>
<div id="intro-hint">click to enter</div>

<!-- 3D WORLD -->
<div id="world"></div>

<!-- OVERLAYS -->
<div id="vignette"></div>
<div id="scanline"></div>
<div id="drag-hint">drag to explore</div>
<div id="cursor-msg">...and I was looking for a friend of mine</div>

<script src="/js/site.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// INTRO — Unknown Pleasures waveform
// ═══════════════════════════════════════════════════════
(function () {
  const introEl = document.getElementById('intro');
  const labelEl = document.getElementById('intro-label');
  const hintEl  = document.getElementById('intro-hint');
  const canvas  = document.getElementById('up-canvas');
  const ctx     = canvas.getContext('2d');

  let W, H, done = false, rafId, startTs = null, shockwave = null;
  const mouse = { x: -9999, y: -9999 };
  const AUTO_PERIOD = 2200;

  function makeRng(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
  }

  const NL = 80, PTS = 300;
  let waves;

  function gauss(x, mu, sig) { return Math.exp(-0.5 * ((x - mu) / sig) ** 2); }
  function lineAmp(i) {
    const t = i / (NL - 1);
    return 0.07 + gauss(t, 0.58, 0.14) * 0.93;
  }

  function buildWaves() {
    const rng = makeRng(1919);
    waves = Array.from({ length: NL }, (_, i) => {
      const a   = lineAmp(i);
      const pkC = 0.27 + (rng() - 0.5) * 0.03, pkS = 0.030 + rng() * 0.016;
      const s1C = 0.50 + (rng() - 0.5) * 0.09, s1S = 0.018 + rng() * 0.014;
      const s2C = 0.70 + (rng() - 0.5) * 0.12, s2S = 0.020 + rng() * 0.012;
      const s2g = rng() > 0.5 ? 1 : -1;
      const row = new Float32Array(PTS);
      for (let j = 0; j < PTS; j++) {
        const t = j / (PTS - 1);
        let y = (rng() - 0.5) * 0.04;
        y += a        * gauss(t, pkC, pkS);
        y += a * 0.30 * gauss(t, s1C, s1S);
        y += a * 0.11 * s2g * gauss(t, s2C, s2S);
        row[j] = Math.max(0, y);
      }
      return row;
    });
  }

  function mouseDisp(x, by) {
    const d = Math.hypot(x - mouse.x, by - mouse.y);
    return d > 155 ? 0 : (1 - d / 155) ** 2 * 60;
  }

  function shockDisp(x, by, sw) {
    const d    = Math.hypot(x - sw.x, by - sw.y);
    const diff = d - sw.radius;
    if (Math.abs(diff) > 125) return 0;
    return Math.sin(-diff / 11) * Math.exp(-Math.abs(diff) / 42) * 105;
  }

  function pulseDisp(x, by, ts) {
    if (!startTs) return 0;
    const phase = ((ts - startTs) % AUTO_PERIOD) / AUTO_PERIOD;
    const R   = phase * Math.hypot(W, H) * 0.82;
    const amp = (1 - phase) * 42;
    const d   = Math.hypot(x - W * 0.5, by - H * 0.5);
    const diff = d - R;
    if (Math.abs(diff) > 68) return 0;
    return Math.sin(-diff / 9) * Math.exp(-Math.abs(diff) / 27) * amp;
  }

  function frame(ts) {
    if (done) return;
    rafId = requestAnimationFrame(frame);
    if (!startTs) startTs = ts;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if (shockwave) shockwave.radius = (ts - shockwave.birthTs) / 1000 * 920;

    const spacing = H / (NL + 3);
    const scale   = spacing * 4.4;

    for (let i = 0; i < NL; i++) {
      const by  = H - spacing - i * spacing;
      const row = waves[i];
      const xs  = new Float32Array(PTS);
      const ys  = new Float32Array(PTS);
      for (let j = 0; j < PTS; j++) {
        xs[j] = (j / (PTS - 1)) * W;
        let dy = row[j] * scale + mouseDisp(xs[j], by) + pulseDisp(xs[j], by, ts);
        if (shockwave) dy += shockDisp(xs[j], by, shockwave);
        ys[j] = by - dy;
      }
      ctx.beginPath();
      ctx.moveTo(0, H + 2);
      for (let j = 0; j < PTS; j++) ctx.lineTo(xs[j], ys[j]);
      ctx.lineTo(W, H + 2);
      ctx.closePath();
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(xs[0], ys[0]);
      for (let j = 1; j < PTS; j++) ctx.lineTo(xs[j], ys[j]);
      ctx.strokeStyle = 'rgba(255,255,255,0.92)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    if (shockwave) {
      const { x, y, radius } = shockwave;
      const inner = Math.max(0, radius - 155);
      ctx.globalCompositeOperation = 'destination-out';
      const g = ctx.createRadialGradient(x, y, inner, x, y, radius);
      g.addColorStop(0, 'rgba(0,0,0,1)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'source-over';
      if (inner > Math.hypot(W, H)) finish();
    }
  }

  function finish() {
    done = true;
    cancelAnimationFrame(rafId);
    [introEl, labelEl, hintEl].forEach(el => {
      el.style.transition = 'opacity 0.6s ease';
      el.style.opacity    = '0';
    });
    setTimeout(revealPage, 300);
    setTimeout(() => [introEl, labelEl, hintEl].forEach(el => el.remove()), 900);
  }

  window.addEventListener('resize', () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });
  canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  canvas.addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; });

  function trigger(x, y) {
    if (shockwave) return;
    [labelEl, hintEl].forEach(el => { el.style.transition = 'opacity 0.2s'; el.style.opacity = '0'; });
    shockwave = { x, y, radius: 0, birthTs: performance.now() };
  }
  canvas.addEventListener('click', e => trigger(e.clientX, e.clientY));
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    trigger(t.clientX, t.clientY);
  }, { passive: false });

  document.body.style.overflow = 'hidden';
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildWaves();
  requestAnimationFrame(frame);
})();

// ═══════════════════════════════════════════════════════
// PAGE REVEAL
// ═══════════════════════════════════════════════════════
function revealPage() {
  document.getElementById('world').classList.add('visible');
  document.getElementById('drag-hint').classList.add('visible');
  // Wait for Space Mono to be available to canvas fillText
  document.fonts.load("700 64px 'Space Mono'").finally(() => initScene());
}

// ═══════════════════════════════════════════════════════
// 3D SCENE
// ═══════════════════════════════════════════════════════
function initScene() {
  const worldEl = document.getElementById('world');

  // ── Seeded RNG ──
  function rng19(seed) {
    let s = (seed ^ 0xdeadbeef) >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
  }
  const rng = rng19(9191);

  // ── Renderer ──
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x010306, 1);
  worldEl.appendChild(renderer.domElement);

  // ── Scene & Fog ──
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x010306, 0.006);

  // ── Camera ──
  const camera = new THREE.PerspectiveCamera(82, window.innerWidth / window.innerHeight, 0.1, 900);
  camera.position.set(0, 0, 0);
  camera.rotation.order = 'YXZ';

  // ── Lights ──
  scene.add(new THREE.AmbientLight(0x050e20, 1.0));

  const moonLight = new THREE.DirectionalLight(0x0a1a3a, 1.8);
  moonLight.position.set(-60, 120, -80);
  scene.add(moonLight);

  const rimLight = new THREE.DirectionalLight(0x0d1a2e, 0.7);
  rimLight.position.set(80, -20, 60);
  scene.add(rimLight);

  // ── Color palette ──
  const WALL_COLORS = [
    0x060c18, 0x080e1c, 0x0a1220,
    0x0d1628, 0x101a2e, 0x131e34,
    0x16223a, 0x1a2640, 0x1e2a46,
    0x1c2238, 0x232c42,
  ];
  const EDGE_COLORS = [
    0x2a3a54, 0x344460, 0x3e506e,
    0x4a607c, 0x566e8c, 0x647a9a,
    0x7090aa, 0x8098b0,
  ];

  function wc() { return WALL_COLORS[Math.floor(rng() * WALL_COLORS.length)]; }
  function ec() { return EDGE_COLORS[Math.floor(rng() * EDGE_COLORS.length)]; }

  function mat(col) {
    return new THREE.MeshPhongMaterial({
      color: col, shininess: 8, specular: 0x0a1428,
    });
  }

  function addEdges(geo, mesh, scene, col, opacity) {
    const edges = new THREE.EdgesGeometry(geo, 15);
    const line  = new THREE.LineSegments(
      edges,
      new THREE.LineBasicMaterial({ color: col || ec(), opacity: opacity || 0.55, transparent: true })
    );
    line.position.copy(mesh.position);
    line.rotation.copy(mesh.rotation);
    line.scale.copy(mesh.scale);
    scene.add(line);
  }

  // ── Canvas-texture text label ──
  // NOTE: call after document.fonts.load() to ensure Space Mono is available
  function makeTextTex(lines, opts) {
    const o = Object.assign({
      w: 1024, h: 256,
      fg: 'rgba(230,238,255,0.97)',
      fs: 64,
      ff: "'Space Mono', 'Courier New', monospace",
      bg: null,   // optional fill
    }, opts);
    const c = document.createElement('canvas');
    c.width = o.w; c.height = o.h;
    const x = c.getContext('2d');
    if (o.bg) { x.fillStyle = o.bg; x.fillRect(0, 0, o.w, o.h); }
    else       { x.clearRect(0, 0, o.w, o.h); }
    x.font          = `700 ${o.fs}px ${o.ff}`;
    x.fillStyle     = o.fg;
    x.textAlign     = 'center';
    x.textBaseline  = 'middle';
    x.shadowColor   = 'rgba(160,185,255,0.45)';
    x.shadowBlur    = 12;
    const lineH  = o.fs * 1.55;
    const startY = o.h / 2 - ((lines.length - 1) * lineH) / 2;
    lines.forEach((l, i) => x.fillText(l, o.w / 2, startY + i * lineH));
    return new THREE.CanvasTexture(c);
  }

  function textPlane(lines, w, h, opts) {
    const tex = makeTextTex(lines, opts);
    const geo = new THREE.PlaneGeometry(w, h);
    const m   = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false,
    });
    return new THREE.Mesh(geo, m);
  }

  // ── Building helpers ──
  function addBox(group, gx, gy, gz, ry, rz, col) {
    const geo = new THREE.BoxGeometry(gx, gy, gz);
    const m   = new THREE.Mesh(geo, mat(col || wc()));
    m.rotation.y = ry || 0;
    m.rotation.z = rz || 0;
    group.add(m);
    addEdges(geo, m, group, ec(), 0.50);
  }

  // ── BUILDING FACTORIES ──

  // Tall monolith — dramatic vertical slab
  function buildTower(bx, by, bz) {
    const g = new THREE.Group();
    const h = 35 + rng() * 55, w = 5 + rng() * 9, d = 5 + rng() * 9;
    const geo = new THREE.BoxGeometry(w, h, d);
    const m   = new THREE.Mesh(geo, mat(wc()));
    m.position.y = h / 2;
    g.add(m);
    addEdges(geo, m, g, ec(), 0.55);

    // Optional cantilever
    if (rng() > 0.45) {
      const sw = w + 5 + rng() * 14, sh = 2.5 + rng() * 3, sd = d + 3 + rng() * 8;
      const sg = new THREE.BoxGeometry(sw, sh, sd);
      const sm = new THREE.Mesh(sg, mat(wc()));
      sm.position.set((rng() - 0.5) * 6, h * (0.38 + rng() * 0.44), 0);
      g.add(sm);
      addEdges(sg, sm, g, ec(), 0.50);
    }
    // Optional piloti column
    if (rng() > 0.6) {
      const col2 = new THREE.CylinderGeometry(0.6, 0.6, h * 0.32, 6);
      const cm   = new THREE.Mesh(col2, mat(wc()));
      cm.position.set(w * 0.35, h * 0.16, d * 0.35);
      g.add(cm);
    }
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    if (rng() > 0.72) g.rotation.z = (rng() - 0.5) * 0.35;
    return g;
  }

  // Wide brutalist slab (elevated on pilotis)
  function buildSlab(bx, by, bz) {
    const g = new THREE.Group();
    const h = 6 + rng() * 10, w = 25 + rng() * 45, d = 10 + rng() * 18;
    const liftY = 8 + rng() * 12;

    const geo = new THREE.BoxGeometry(w, h, d);
    const m   = new THREE.Mesh(geo, mat(wc()));
    m.position.y = liftY + h / 2;
    g.add(m);
    addEdges(geo, m, g, ec(), 0.55);

    // Columns below slab
    const ncols = Math.floor(2 + rng() * 3);
    for (let ci = 0; ci < ncols; ci++) {
      const cx = (ci / (ncols - 1) - 0.5) * (w * 0.75);
      const cg = new THREE.CylinderGeometry(0.7, 0.7, liftY, 5);
      const cm = new THREE.Mesh(cg, mat(wc()));
      cm.position.set(cx, liftY / 2, 0);
      g.add(cm);
    }
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    return g;
  }

  // Abstract polyhedron (icosahedron / dodecahedron — brutalist alien)
  function buildPoly(bx, by, bz) {
    const g    = new THREE.Group();
    const r    = 6 + rng() * 14;
    const kind = rng() > 0.5;
    const geo  = kind
      ? new THREE.IcosahedronGeometry(r, 0)
      : new THREE.DodecahedronGeometry(r, 0);
    const m = new THREE.Mesh(geo, mat(wc()));
    m.position.y = r;
    g.add(m);
    addEdges(geo, m, g, ec(), 0.65);

    // Spike: extrude a box out of it
    if (rng() > 0.5) {
      const sg = new THREE.BoxGeometry(1.5, 18 + rng() * 20, 1.5);
      const sm = new THREE.Mesh(sg, mat(wc()));
      sm.position.y = r * 1.6 + 8;
      sm.rotation.z = (rng() - 0.5) * 0.5;
      g.add(sm);
      addEdges(sg, sm, g, ec(), 0.50);
    }
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    g.rotation.x = (rng() - 0.5) * 0.4;
    if (rng() > 0.6) g.userData.driftSpeed = (rng() - 0.5) * 0.0008;
    return g;
  }

  // Stepped pyramid / inverted pyramid
  function buildPyramid(bx, by, bz) {
    const g       = new THREE.Group();
    const nSteps  = 3 + Math.floor(rng() * 3);
    const inverted = rng() > 0.5;
    for (let s = 0; s < nSteps; s++) {
      const frac = inverted ? (s / nSteps) : (1 - s / nSteps);
      const sw   = 4 + frac * 22;
      const sh   = 5 + rng() * 4;
      const geo  = new THREE.BoxGeometry(sw, sh, sw * 0.85);
      const m    = new THREE.Mesh(geo, mat(wc()));
      m.position.y = s * sh + sh / 2;
      g.add(m);
      addEdges(geo, m, g, ec(), 0.55);
    }
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    if (inverted) g.position.y = by + 30 + rng() * 15;
    if (rng() > 0.65) g.rotation.z = (rng() - 0.5) * 0.5;
    return g;
  }

  // Cruciform (two slabs crossing at center)
  function buildCross(bx, by, bz) {
    const g = new THREE.Group();
    const h = 20 + rng() * 40, thick = 5 + rng() * 6, span = 20 + rng() * 30;
    for (let axis = 0; axis < 2; axis++) {
      const geo = new THREE.BoxGeometry(axis === 0 ? span : thick, h, axis === 0 ? thick : span);
      const m   = new THREE.Mesh(geo, mat(wc()));
      m.position.y = h / 2;
      g.add(m);
      addEdges(geo, m, g, ec(), 0.55);
    }
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    if (rng() > 0.7) g.rotation.z = (rng() - 0.5) * 0.28;
    return g;
  }

  // Monolithic shard (thin, very tall, dramatically tilted)
  function buildShard(bx, by, bz) {
    const g  = new THREE.Group();
    const h  = 40 + rng() * 60;
    const geo = new THREE.BoxGeometry(2.5 + rng() * 3, h, 2 + rng() * 2.5);
    const m  = new THREE.Mesh(geo, mat(wc()));
    m.position.y = h / 2;
    g.add(m);
    addEdges(geo, m, g, ec(), 0.70);
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    g.rotation.z = (rng() - 0.5) * 1.0; // dramatic lean
    g.rotation.x = (rng() - 0.5) * 0.5;
    if (rng() > 0.5) g.userData.driftSpeed = (rng() - 0.5) * 0.0005;
    return g;
  }

  // Torus arch — brutal circular form
  function buildArch(bx, by, bz) {
    const g   = new THREE.Group();
    const R   = 8 + rng() * 14, r = 1.5 + rng() * 3;
    const geo = new THREE.TorusGeometry(R, r, 6, 16);
    const m   = new THREE.Mesh(geo, mat(wc()));
    m.position.y = R;
    m.rotation.x = Math.PI / 2;
    g.add(m);
    addEdges(geo, m, g, ec(), 0.60);
    g.position.set(bx, by, bz);
    g.rotation.y = rng() * Math.PI * 2;
    if (rng() > 0.5) g.userData.driftSpeed = (rng() - 0.5) * 0.0006;
    return g;
  }

  // ── Nav item definitions (defined first so building exclusion can use them) ──
  // angle=0 → straight ahead (-Z). Spread 7 items starting at 50° to avoid
  // the identity billboard's forward zone (within ±25° of 0).
  const D2R = Math.PI / 180;
  const navItems = [
    { label: 'BLOG',     href: '/blog/',      angle:  50 * D2R, dist: 34, y:  1.0 },
    { label: 'PROBLEMS', href: '/problems/',  angle: 100 * D2R, dist: 36, y: -1.5 },
    { label: 'PROJECTS', href: '/projects/',  angle: 155 * D2R, dist: 34, y:  2.0 },
    { label: 'NOTES',    href: '/notes/',     angle: 205 * D2R, dist: 36, y: -1.0 },
    { label: 'ABOUT',    href: '/about/',     angle: 255 * D2R, dist: 34, y:  1.5 },
    { label: 'CONTACT',  href: '/contact/',   angle: 305 * D2R, dist: 36, y: -0.5 },
    { label: 'GOFAR',    href: '/gofar/',     angle: 288 * D2R, dist: 36, y:  2.5 },
  ];

  // Precompute nav world positions for exclusion checks
  const navPositions = navItems.map(item => ({
    x: Math.sin(item.angle) * item.dist,
    z: -Math.cos(item.angle) * item.dist,
  }));

  // ── Exclusion zone check (keeps sight-lines clear) ──
  function isBlocked(bx, bz) {
    // Forward tunnel where identity billboard sits (z=-35, centered at origin)
    if (bz < -12 && bz > -50 && Math.abs(bx) < 14) return true;
    // Bubble around each nav panel
    for (const p of navPositions) {
      if (Math.hypot(bx - p.x, bz - p.z) < 14) return true;
    }
    return false;
  }

  // ── Place buildings (skip excluded zones) ──
  const factories = [buildTower, buildTower, buildTower, buildSlab, buildPoly, buildPyramid, buildCross, buildShard, buildArch];

  let placed = 0, attempts = 0;
  while (placed < 80 && attempts < 400) {
    attempts++;
    const angle = rng() * Math.PI * 2;
    const dist  = 38 + rng() * 170;
    const bx    = Math.cos(angle) * dist;
    const bz    = Math.sin(angle) * dist;
    if (isBlocked(bx, bz)) continue;
    const by = (rng() - 0.5) * 20 - 18;
    const f  = factories[Math.floor(rng() * factories.length)];
    scene.add(f(bx, by, bz));
    placed++;
  }

  // ── Floating debris ──
  for (let i = 0; i < 30; i++) {
    const angle = rng() * Math.PI * 2;
    const dist  = 10 + rng() * 60;
    const bx    = Math.cos(angle) * dist;
    const bz    = Math.sin(angle) * dist;
    const by    = (rng() - 0.5) * 40;
    const s     = 0.5 + rng() * 3;
    const geo   = rng() > 0.5
      ? new THREE.BoxGeometry(s, s * (1 + rng() * 4), s)
      : new THREE.OctahedronGeometry(s * 1.5, 0);
    const m = new THREE.Mesh(geo, mat(wc()));
    m.position.set(bx, by, bz);
    m.rotation.set(rng() * Math.PI, rng() * Math.PI, rng() * Math.PI);
    m.userData.driftSpeed = (rng() - 0.5) * 0.002;
    scene.add(m);
    addEdges(geo, m, scene, ec(), 0.40);
  }

  // ── Identity billboard — straight ahead, z=-35 ──
  {
    const Z = -35;
    const bkGeo = new THREE.BoxGeometry(44, 13, 0.5);
    const backing = new THREE.Mesh(
      bkGeo,
      new THREE.MeshPhongMaterial({ color: 0x020710, transparent: true, opacity: 0.94 })
    );
    backing.position.set(0, 0, Z);
    scene.add(backing);
    addEdges(bkGeo, backing, scene, 0x506080, 0.70);

    const namePlane = textPlane(
      ['VASUDEVAN', 'GOVARDHANEN'],
      42, 11,
      { w: 1024, h: 512, fs: 92, fg: 'rgba(230,238,255,0.99)' }
    );
    namePlane.position.set(0, 1.0, Z + 0.35);
    scene.add(namePlane);

    const subPlane = textPlane(
      ['HS SENIOR  ·  MANALAPAN NJ  ·  COMPUTING ARCHITECTURE'],
      42, 3,
      { w: 1024, h: 128, fs: 28, fg: 'rgba(140,165,220,0.82)' }
    );
    subPlane.position.set(0, -5.6, Z + 0.35);
    scene.add(subPlane);
  }

  // ── Nav panels — one per page, face the origin ──
  const navMeshes = [];
  navItems.forEach(item => {
    const bx = Math.sin(item.angle) * item.dist;
    const bz = -Math.cos(item.angle) * item.dist;
    const by = item.y;

    const bkGeo = new THREE.BoxGeometry(17, 5.5, 0.4);
    const bg = new THREE.Mesh(
      bkGeo,
      new THREE.MeshPhongMaterial({ color: 0x020710, transparent: true, opacity: 0.92 })
    );
    bg.position.set(bx, by, bz);
    bg.lookAt(0, by, 0);
    scene.add(bg);
    addEdges(bkGeo, bg, scene, 0x3a5878, 0.72);

    const plane = textPlane(
      [item.label],
      15, 4,
      { w: 1024, h: 256, fs: 100, fg: 'rgba(215,228,255,0.98)' }
    );
    plane.position.set(bx, by, bz);
    plane.lookAt(0, by, 0);
    const toward = new THREE.Vector3(-bx, 0, -bz).normalize();
    plane.position.addScaledVector(toward, 0.25);
    scene.add(plane);

    navMeshes.push({ mesh: bg, href: item.href });
  });

  // ── Ground grid (faint, far below) ──
  const grid = new THREE.GridHelper(800, 60, 0x0d1a2e, 0x080e1a);
  grid.position.y = -22;
  scene.add(grid);

  // Horizon ring (gives sense of ground)
  const ringGeo = new THREE.TorusGeometry(200, 0.3, 4, 60);
  const ringMat = new THREE.LineBasicMaterial({ color: 0x0f1e30, opacity: 0.40, transparent: true });
  const ring    = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x0f1e30, transparent: true, opacity: 0.15 }));
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -22;
  scene.add(ring);

  // ── Raycaster for nav click ──
  const raycaster = new THREE.Raycaster();
  const mouse2d   = new THREE.Vector2();

  // ── Cursor message ──
  const cursorMsg = document.getElementById('cursor-msg');
  document.addEventListener('mousemove', e => {
    cursorMsg.style.left = e.clientX + 'px';
    cursorMsg.style.top  = e.clientY + 'px';
  });

  // ── Camera controls ──
  let azimuth = 0, elevation = 0;
  let velAz = 0, velEl = 0;
  let isDragging = false, prevX = 0, prevY = 0;
  let dragDist = 0;

  function onPointerDown(x, y) {
    isDragging = true; prevX = x; prevY = y;
    dragDist = 0; velAz = velEl = 0;
    cursorMsg.classList.add('active');
  }
  function onPointerMove(x, y) {
    if (!isDragging) return;
    const dx = x - prevX, dy = y - prevY;
    dragDist += Math.hypot(dx, dy);
    velAz = dx * 0.0042; velEl = dy * 0.0035;
    azimuth   -= dx * 0.0042;
    elevation  = Math.max(-1.1, Math.min(1.1, elevation - dy * 0.0035));
    prevX = x; prevY = y;
  }
  function onPointerUp(x, y) {
    isDragging = false;
    cursorMsg.classList.remove('active');
    if (dragDist < 8) {
      mouse2d.x =  (x / window.innerWidth)  * 2 - 1;
      mouse2d.y = -(y / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse2d, camera);
      const hits = raycaster.intersectObjects(navMeshes.map(n => n.mesh));
      if (hits.length) {
        const nav = navMeshes.find(n => n.mesh === hits[0].object);
        if (nav) window.location.href = nav.href;
      }
    }
  }

  const el = renderer.domElement;
  el.addEventListener('mousedown',  e => onPointerDown(e.clientX, e.clientY));
  el.addEventListener('mousemove',  e => onPointerMove(e.clientX, e.clientY));
  el.addEventListener('mouseup',    e => onPointerUp(e.clientX, e.clientY));
  el.addEventListener('mouseleave', () => { isDragging = false; cursorMsg.classList.remove('active'); });
  el.addEventListener('touchstart', e => { e.preventDefault(); onPointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  el.addEventListener('touchmove',  e => { e.preventDefault(); onPointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  el.addEventListener('touchend',   e => { onPointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  // ── Animate ──
  function animate() {
    requestAnimationFrame(animate);

    if (!isDragging) {
      azimuth  -= velAz;
      elevation = Math.max(-1.1, Math.min(1.1, elevation - velEl));
      velAz *= 0.89; velEl *= 0.89;
    }

    camera.rotation.y = azimuth;
    camera.rotation.x = elevation;

    // Drift floating objects
    scene.children.forEach(child => {
      if (child.userData.driftSpeed) child.rotation.y += child.userData.driftSpeed;
    });

    renderer.render(scene, camera);
  }

  animate();
}
</script>
</body>
</html>
