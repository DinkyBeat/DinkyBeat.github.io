<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasu Govardhanen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Headland+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #FAFAF8;
  --text:   #18160F;
  --muted:  #6B6560;
  --border: #E0DDD6;
  --shell:  #E8E5DE;
  --link:   #9483BF;
  --link-h: #7460A8;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--link); text-decoration: underline; text-decoration-color: #C4B8E0; }
a:hover { color: var(--link-h); text-decoration-color: var(--link); }

/* ── Full-screen split ── */
.hero {
  display: flex;
  height: 100vh;
}

/* ── Left column ── */
.hero-left {
  flex: 1 1 64%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(48px, 7vw, 100px) clamp(32px, 5vw, 72px) clamp(48px, 7vw, 100px) clamp(40px, 6vw, 88px);
}

.hero-name {
  font-family: 'Headland One', Georgia, serif;
  font-size: clamp(40px, 5.4vw, 70px);
  font-weight: 400;
  line-height: 1.06;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 24px;
}

.hero-sub {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 8px;
}

.hero-focus {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 44px;
}

/* Outlined info boxes */
.hero-boxes {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hero-box {
  border: 1px solid var(--border);
  padding: 13px 17px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.box-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text);
}

.hero-box a {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px;
  color: var(--link);
  text-decoration: none;
}
.hero-box a:hover { color: var(--link-h); }

/* ── Right column ── */
.hero-right {
  flex: 0 0 36%;
  background: var(--shell);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 44px;
}

/* Tiled image panel — floats, does not span full height */
.image-panel {
  width: 100%;
  height: 68vh;
  overflow: hidden;
  background-image:
    url('https://f4.bcbits.com/img/a1194942138_10.jpg');
  background-size: 100% auto;
  background-repeat: repeat-y;
  background-position: top center;
}

/* Responsive */
@media (max-width: 720px) {
  .hero { flex-direction: column; height: auto; }
  .hero-right {
    padding: 32px 24px;
    height: auto;
  }
  .image-panel { height: 56vw; }
}
</style>
</head>
<body>

<main class="hero">

  <div class="hero-left">
    <h1 class="hero-name">Vasu Govardhanen</h1>
    <p class="hero-sub">Incoming freshman, <a href="https://cs.illinois.edu/" target="_blank" rel="noopener">CS @ UIUC</a></p>
    <p class="hero-focus">Areas of focus: ML systems + theory, differential geometry, and <a href="https://projecteuler.net/" target="_blank" rel="noopener">puzzles</a></p>
    <div class="hero-boxes">
      <div class="hero-box">
        <span class="box-label">Contact</span>
        <a href="mailto:vgovardhanen@gmail.com">vgovardhanen@gmail.com</a>
      </div>
      <div class="hero-box">
        <span class="box-label">Blog</span>
        <a href="/blog/">Writing</a>
      </div>
      <div class="hero-box">
        <span class="box-label">Problems</span>
        <a href="/problems/">Open problems</a>
      </div>
    </div>
  </div>

  <div class="hero-right">
    <div class="image-panel"></div>
  </div>

</main>

<script src="/js/site.js"></script>
</body>
</html>
