<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasu Govardhanen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Headland+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
/* ── Split-screen hero ── */
.hero {
  display: flex;
  height: calc(100vh - 57px);
  overflow: hidden;
}

/* Left: typography column */
.hero-left {
  flex: 1 1 60%;
  padding: clamp(40px, 6vw, 88px) clamp(20px, 4vw, 56px) clamp(40px, 6vw, 88px) clamp(28px, 5vw, 72px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
}

.hero-name {
  font-family: 'Headland One', Georgia, serif;
  font-size: clamp(38px, 5.2vw, 68px);
  font-weight: 400;
  line-height: 1.06;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 28px;
}

.hero-sub {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 10px;
}
.hero-sub a {
  color: #9483BF;
  text-decoration: underline;
  text-decoration-color: #C4B8E0;
}
.hero-sub a:hover { color: #7460A8; text-decoration-color: #9483BF; }

.hero-focus {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 40px;
}
.hero-focus a {
  color: #9483BF;
  text-decoration: underline;
  text-decoration-color: #C4B8E0;
}
.hero-focus a:hover { color: #7460A8; text-decoration-color: #9483BF; }

/* Three outlined boxes */
.hero-boxes {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hero-box {
  border: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.box-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text);
}

.hero-box a {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px;
  color: #9483BF;
  text-decoration: none;
}
.hero-box a:hover { color: #7460A8; }

/* Right: photo in geometric shell */
.hero-right {
  flex: 0 0 40%;
  background: #CFC9BB;
  padding: 28px 28px 28px 0;
  display: flex;
  align-items: stretch;
}

.hero-right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

/* Responsive: stack on small screens */
@media (max-width: 700px) {
  .hero {
    flex-direction: column;
    height: auto;
  }
  .hero-right {
    flex: none;
    height: 60vw;
    width: 100%;
    padding: 20px;
  }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner nav-inner--full">
    <a href="/" class="nav-logo">Vasu Govardhanen</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/problems/">Problems</a></li>
    </ul>
  </div>
</nav>

<main class="hero">

  <div class="hero-left">
    <h1 class="hero-name">Vasu<br>Govardhanen</h1>
    <p class="hero-sub">Incoming freshman, <a href="https://cs.illinois.edu/" target="_blank" rel="noopener">CS&nbsp;@ UIUC</a></p>
    <p class="hero-focus">Areas of focus: ML systems&thinsp;+&thinsp;theory,<br>differential geometry, and <a href="https://projecteuler.net/" target="_blank" rel="noopener">puzzles</a></p>
    <div class="hero-boxes">
      <div class="hero-box">
        <span class="box-label">Contact</span>
        <a href="mailto:vgovardhanen@gmail.com">vgovardhanen@gmail.com</a>
      </div>
      <div class="hero-box">
        <span class="box-label">Blog</span>
        <a href="/blog/">Writing</a>
      </div>
      <div class="hero-box">
        <span class="box-label">Problems</span>
        <a href="/problems/">Open problems</a>
      </div>
    </div>
  </div>

  <div class="hero-right">
    <img src="https://f4.bcbits.com/img/a3508978113_16.jpg" alt="">
  </div>

</main>

<script src="/js/site.js"></script>
</body>
</html>
